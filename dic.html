<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>絶望要塞IG かくれんぼツール (メンバー確認版)</title>
    <style>
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace, sans-serif; }
        body { 
            background-color: #060d13; 
            color: #cceeff; 
            margin: 0; 
            padding: 15px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        h1 {
            font-size: 1.4rem;
            text-align: center;
            margin: 0 0 10px 0;
            color: #8cc8ff;
            text-shadow: 0 0 8px rgba(140, 200, 255, 0.6);
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(140, 200, 255, 0.3);
            padding-bottom: 5px;
        }

        /* メンバー確認用のスタイル */
        .member-status-bar {
            background: rgba(0, 255, 100, 0.1);
            border: 1px solid rgba(0, 255, 100, 0.3);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #00ff66;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-shadow: 0 0 4px rgba(0, 255, 100, 0.4);
        }
        .online-dot {
            width: 8px;
            height: 8px;
            background-color: #00ff66;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px #00ff66;
            animation: blink 1s infinite alternate;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #00ff66;
            margin-bottom: 10px;
            text-shadow: 0 0 5px rgba(0, 255, 100, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .camera-container {
            width: 100%;
            background: #000;
            border: 2px solid #8cc8ff;
            box-shadow: 0 0 15px rgba(140, 200, 255, 0.2);
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
            aspect-ratio: 4 / 3;
        }

        #camera-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .shutter-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-shutter {
            flex: 1;
            background: linear-gradient(135deg, #0055aa, #002255);
            color: #cceeff;
            border: 2px solid #8cc8ff;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(140, 200, 255, 0.4);
            text-shadow: 0 0 5px #cceeff;
            transition: all 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-shutter:active {
            background: #00ff66;
            color: #000;
            border-color: #ffffff;
            box-shadow: 0 0 15px #00ff66;
            transform: scale(0.98);
        }

        .log-carousel {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            margin-bottom: 15px;
            border-bottom: 1px dashed rgba(140, 200, 255, 0.2);
            min-height: 75px;
        }
        .log-item {
            flex: 0 0 70px;
            height: 70px;
            border: 1px solid rgba(140, 200, 255, 0.4);
            position: relative;
            background: #0b1520;
            border-radius: 2px;
        }
        .log-item img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .log-item .status-badge {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.7);
            font-size: 0.5rem;
            text-align: center;
            color: #00ff66;
            padding: 1px 0;
        }
        .log-item.processing .status-badge { color: #ffcc00; }
        .log-item.error .status-badge { color: #ff3333; }

        /* 設定ボックスを3カラムに変更 */
        .config-box {
            background: rgba(140, 200, 255, 0.05);
            border: 1px solid rgba(140, 200, 255, 0.2);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .config-box div { display: flex; flex-direction: column; gap: 4px; }
        .config-box label { font-size: 0.7rem; color: #8cc8ff; }
        .config-box input {
            width: 100%;
            background: #0b1520;
            border: 1px solid #8cc8ff;
            color: #00ff66;
            padding: 6px;
            font-size: 0.8rem;
            border-radius: 2px;
        }

        .search-inputs-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        .search-row-item {
            display: flex;
            align-items: center;
            background: rgba(6, 19, 31, 0.6);
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid rgba(140, 200, 255, 0.2);
            gap: 15px;
        }
        .search-row-item label {
            font-size: 0.75rem;
            color: #8cc8ff;
            font-weight: bold;
            min-width: 55px;
        }
        .search-row-item input {
            background: #02070c;
            border: 1px solid rgba(140, 200, 255, 0.5);
            color: #00ff64;
            padding: 6px;
            font-size: 1.1rem;
            width: 100px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 4px rgba(0,255,100,0.5);
        }
        .search-row-item input:focus {
            outline: none;
            border-color: #00ff64;
        }
        
        .slot-result-text {
            font-weight: bold;
            color: #ff007f;
            font-size: 1.2rem;
            text-shadow: 0 0 8px #ff007f;
            margin-left: auto;
            min-width: 30px;
            text-align: right;
        }

        .action-panel {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .btn-purple {
            border: 1px solid #b57cff;
            color: #b57cff;
            background: rgba(181, 124, 255, 0.1);
            text-shadow: 0 0 4px #b57cff;
            padding: 12px;
            font-weight: bold;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
        }
        .btn-purple:active { background: #b57cff; color: #060d13; box-shadow: 0 0 15px #b57cff; }
        .btn-success {
            border: 2px solid #00ff64;
            color: #00ff64;
            background: rgba(0, 255, 100, 0.1);
            text-shadow: 0 0 4px #00ff64;
            padding: 12px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            flex: 1.5;
        }
        .btn-success:active { background: #00ff64; color: #060d13; box-shadow: 0 0 15px #00ff64; }

        .summary-gallery {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: 100%;
            margin-bottom: 15px;
        }
        .summary-card { 
            background: rgba(4, 12, 20, 0.8); 
            border: 1px solid rgba(140, 200, 255, 0.25); 
            border-radius: 4px; 
            padding: 6px; 
            display: flex; 
            flex-direction: column; 
            gap: 5px;
            text-align: center;
        }
        .summary-header { 
            font-size: 16px; 
            font-weight: bold; 
            color: #00ff64; 
            text-shadow: 0 0 6px rgba(0,255,100,0.6);
            line-height: 1.1;
        }
        .summary-canvas-wrapper { 
            background: #000; 
            border: 1px solid rgba(140, 200, 255, 0.3); 
            border-radius: 3px; 
            overflow: hidden; 
        }
        .summary-canvas-wrapper canvas, .summary-canvas-wrapper img { 
            width: 100%; 
            height: auto; 
            display: block; 
            max-height: 85px; 
            object-fit: contain; 
        }

        .btn-reset {
            width: 100%;
            background: linear-gradient(135deg, #881111, #440000);
            color: #ff8888;
            border: 1px solid #ff3333;
            padding: 10px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .btn-reset:active { background: #ff3333; color: #fff; }

        .loading-dimmer {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 20, 40, 0.4); z-index: 10; justify-content: center; align-items: center;
            font-size: 0.9rem; color: #00ff66; text-shadow: 0 0 5px #00ff66;
        }
        .loading-dimmer::after { content: "SCANNING..."; animation: blink 0.6s infinite alternate; }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }

        #target-loading {
            display: none; color: #b57cff; font-weight: bold; font-size: 11px; text-align: center;
            padding: 8px; background: rgba(181, 124, 255, 0.1); border: 1px solid #b57cff; border-radius: 4px;
            margin-bottom: 10px; animation: blink 1.5s infinite;
        }
    </style>

    <!-- Firebase SDKの読み込み -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBkBDexKsmmzKc3HAd8PMdV56-Lxxz8uyk",
            authDomain: "ig-tool-97279.firebaseapp.com",
            projectId: "ig-tool-97279",
            storageBucket: "ig-tool-97279.firebasestorage.app",
            messagingSenderId: "651548330208",
            appId: "1:651548330208:web:f90d4cef127a3e73b5e885"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allPhotosData = []; 
        let streamObject = null;
        let isSyncingFromCloud = false; 
        const myDeviceId = "dev-" + Math.random().toString(36).substr(2, 9); // 端末識別用

        const searchBoxes = [
            document.getElementById('box-0'),
            document.getElementById('box-1'),
            document.getElementById('box-2'),
            document.getElementById('box-3'),
            document.getElementById('box-4')
        ];

        window.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            initCameraStream();
            initSummaryAreaPlaceholder();
            setupRoomSync(); 
            
            document.getElementById('shutter-trigger').addEventListener('click', captureAndScan);
            document.getElementById('btn-search').addEventListener('click', () => { executeSearch(); saveCurrentSlotsToCloud(); });
            document.getElementById('btn-reset-all').addEventListener('click', resetSystem);
            document.getElementById('question-camera-input').addEventListener('change', scanQuestionImage);
            
            searchBoxes.forEach(box => box.addEventListener('input', saveCurrentSlotsToCloud));
            document.getElementById('room-id').addEventListener('change', () => { saveConfig(); setupRoomSync(); });
            document.getElementById('user-name').addEventListener('input', () => { saveConfig(); reportPresence(); });
            document.getElementById('api-key').addEventListener('change', saveConfig);

            // ページを閉じる・離れるときに名前リストから消去
            window.addEventListener('beforeunload', removePresence);
            window.addEventListener('pagehide', removePresence);
        });

        let unsubscribeRoom = null;
        function setupRoomSync() {
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            if (unsubscribeRoom) unsubscribeRoom();

            // 部屋に入ったらまず名前を即報告
            setTimeout(reportPresence, 500);

            unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), (docSnap) => {
                isSyncingFromCloud = true;

                if (!docSnap.exists()) {
                    // ルームが空、またはリセットされたとき
                    document.getElementById('member-list-text').innerText = `ONLINE: 待機中...`;
                    searchBoxes.forEach(box => box.value = "");
                    allPhotosData = [];
                    document.getElementById('db-counter').innerText = "STOCKS: 0";
                    document.getElementById('log-carousel').innerHTML = '';
                    clearSlotResults();
                    initSummaryAreaPlaceholder();
                    isSyncingFromCloud = false;
                    return;
                }

                const data = docSnap.data();

                // メンバーリストの更新表示
                if (data.members) {
                    const onlineNames = Object.values(data.members).filter(name => name && name.trim() !== "");
                    const count = onlineNames.length;
                    if (count > 0) {
                        document.getElementById('member-list-text').innerText = `ONLINE: ${onlineNames.join(', ')} (${count}人)`;
                    } else {
                        document.getElementById('member-list-text').innerText = `ONLINE: 未入力の端末 (${Object.keys(data.members).length}台)`;
                    }
                } else {
                    document.getElementById('member-list-text').innerText = `ONLINE: 待機中...`;
                }

                if (data.slots) {
                    data.slots.forEach((val, idx) => {
                        if (searchBoxes[idx] && searchBoxes[idx].value !== val) {
                            searchBoxes[idx].value = val;
                        }
                    });
                }

                if (data.photos) {
                    allPhotosData = data.photos;
                    document.getElementById('db-counter').innerText = `STOCKS: ${allPhotosData.length}`;
                    
                    const carousel = document.getElementById('log-carousel');
                    carousel.innerHTML = '';
                    allPhotosData.slice().reverse().forEach(photo => {
                        const logItem = document.createElement('div');
                        logItem.className = 'log-item';
                        logItem.id = photo.id;
                        logItem.innerHTML = `<img src="${photo.base64}"><div class="status-badge" style="color:#00ff66;">SUCCESS</div>`;
                        carousel.appendChild(logItem);
                    });
                } else {
                    allPhotosData = [];
                    document.getElementById('db-counter').innerText = "STOCKS: 0";
                    document.getElementById('log-carousel').innerHTML = '';
                }

                executeSearch();
                isSyncingFromCloud = false;
            });
        }

        // 自分の名前情報をクラウドに送信する
        async function reportPresence() {
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            const name = document.getElementById('user-name').value.trim() || `ゲスト-${myDeviceId.substr(4,4)}`;
            
            const updateObj = { members: {} };
            updateObj.members[myDeviceId] = name;
            try {
                // 安全に値をマージ（部屋がなくても強制作成）
                await setDoc(doc(db, "rooms", roomId), updateObj, { merge: true });
            } catch (e) { console.error("Presence Error:", e); }
        }

        // 退室時に名前を消す
        async function removePresence() {
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            const updateObj = { members: {} };
            updateObj.members[myDeviceId] = null;
            try {
                await setDoc(doc(db, "rooms", roomId), updateObj, { merge: true });
            } catch (e) {}
        }

        async function saveCurrentSlotsToCloud() {
            if (isSyncingFromCloud) return;
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            const slotsData = searchBoxes.map(b => b.value.trim());
            try {
                await setDoc(doc(db, "rooms", roomId), { slots: slotsData }, { merge: true });
            } catch (e) { console.error("Cloud Slot Save Error:", e); }
        }

        async function savePhotosToCloud() {
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            try {
                await setDoc(doc(db, "rooms", roomId), { photos: allPhotosData }, { merge: true });
            } catch (e) { console.error("Cloud Photos Save Error:", e); }
        }

        async function initCameraStream() {
            const video = document.getElementById('camera-stream');
            try {
                if (streamObject) { streamObject.getTracks().forEach(track => track.stop()); }
                const constraints = {
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                };
                streamObject = await navigator.mediaDevices.getUserMedia(constraints)
                    .catch(() => navigator.mediaDevices.getUserMedia({ video: true, audio: false }));
                video.srcObject = streamObject;
            } catch (err) { alert("カメラ起動エラー: " + err.message); }
        }

        async function captureAndScan() {
            const video = document.getElementById('camera-stream');
            const canvas = document.getElementById('capture-canvas');
            const carousel = document.getElementById('log-carousel');
            const apiKey = document.getElementById('api-key').value.trim();

            if (!apiKey) return alert("先にPASSを入力してください。");
            if (!video.srcObject) return alert("カメラストリームが不完全です。");

            canvas.width = 1280;
            canvas.height = 960;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const base64Image = canvas.toDataURL('image/jpeg', 0.8);
            const logId = "log-" + Date.now() + "-" + Math.random().toString(36).substr(2, 5);
            
            const logItem = document.createElement('div');
            logItem.className = 'log-item processing';
            logItem.id = logId;
            logItem.innerHTML = `<img src="${base64Image}"><div class="status-badge">RUNNING</div>`;
            carousel.insertBefore(logItem, carousel.firstChild);

            const indicator = document.getElementById('scan-indicator');
            indicator.style.display = 'flex'; setTimeout(() => { indicator.style.display = 'none'; }, 150);

            sendToVisionAPI(base64Image, logId);
        }

        async function sendToVisionAPI(base64Data, logId) {
            const apiKey = document.getElementById('api-key').value.trim();
            const logItem = document.getElementById(logId);
            const pureBase64 = base64Data.replace(/^data:image\/jpeg;base64,/, "");

            try {
                const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requests: [{ image: { content: pureBase64 }, features: [{ type: "TEXT_DETECTION" }] }] })
                });

                const data = await response.json();
                const annotations = data.responses[0]?.textAnnotations;
                if (!annotations || annotations.length === 0) throw new Error();

                const parsedData = parseOcrAnnotations(annotations, base64Data);
                allPhotosData.push({ id: logId, base64: base64Data, blocks: parsedData });

                await savePhotosToCloud();
            } catch (err) {
                if (logItem) {
                    logItem.className = 'log-item error';
                    logItem.querySelector('.status-badge').innerText = 'ERR';
                    logItem.querySelector('.status-badge').style.color = '#ff3333';
                }
            }
        }

        function parseOcrAnnotations(annotations, originalBase64) {
            const rawBlocks = annotations.slice(1);
            let charObjects = rawBlocks.map(b => {
                const vertices = b.boundingPoly.vertices;
                const xs = vertices.map(v => v.x ?? 0), ys = vertices.map(v => v.y ?? 0);
                const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
                return {
                    text: b.description,
                    centerX: minX + (maxX - minX) / 2, centerY: minY + (maxY - minY) / 2,
                    width: maxX - minX, height: maxY - minY, minX, maxX, minY, maxY
                };
            });

            let numberBlocks = charObjects.filter(b => /^\d+$/.test(b.text));
            let alphaBlocks = charObjects.filter(b => /^[A-Z]$/i.test(b.text));
            let parsedBlocks = [];

            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            const img = new Image();
            img.src = originalBase64;

            numberBlocks.forEach(numBlk => {
                let bestMatchAlpha = null;
                let minDistance = Infinity;
                const maxAllowedYDiff = numBlk.height * 4.0; 

                alphaBlocks.forEach(alphaBlk => {
                    const xDiff = Math.abs(numBlk.centerX - alphaBlk.centerX);
                    const yDiff = alphaBlk.centerY - numBlk.centerY;
                    if (yDiff > 0 && yDiff < maxAllowedYDiff && xDiff < (numBlk.width * 1.2)) {
                        const distance = Math.sqrt(xDiff * xDiff + yDiff * yDiff);
                        if (distance < minDistance) { minDistance = distance; bestMatchAlpha = alphaBlk; }
                    }
                });

                if (bestMatchAlpha) {
                    const minX = Math.max(0, Math.min(numBlk.minX, bestMatchAlpha.minX) - 4);
                    const minY = Math.max(0, numBlk.minY - 6);
                    const maxX = Math.max(numBlk.maxX, bestMatchAlpha.maxX) + 4;
                    const maxY = bestMatchAlpha.maxY + 8;
                    const w = maxX - minX;
                    const h = maxY - minY;

                    let croppedBase64 = "";
                    if(img.complete) {
                        tempCanvas.width = w; tempCanvas.height = h;
                        tempCtx.drawImage(img, minX, minY, w, h, 0, 0, w, h);
                        croppedBase64 = tempCanvas.toDataURL('image/jpeg', 0.9);
                    }

                    parsedBlocks.push({
                        number: numBlk.text, 
                        alphabet: bestMatchAlpha.text,
                        croppedImg: croppedBase64 
                    });
                }
            });
            return parsedBlocks;
        }

        async function scanQuestionImage(e) {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;
            const apiKey = document.getElementById('api-key').value.trim();
            if (!apiKey) return alert("先にPASSを入力してください。");

            const loading = document.getElementById('target-loading');
            loading.style.display = 'block';

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Image = event.target.result.split(',')[1];
                fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requests: [{ image: { content: base64Image }, features: [{ type: 'DOCUMENT_TEXT_DETECTION' }] }] })
                })
                .then(res => res.json())
                .then(data => {
                    loading.style.display = 'none';
                    clearSlotResults();
                    if (data.responses?.[0]?.textAnnotations) {
                        const annotations = data.responses[0].textAnnotations.slice(1);
                        let mapped = annotations
                            .filter(a => /^\d+$/.test(a.description.trim()))
                            .map(a => ({ text: a.description.trim(), x: a.boundingPoly.vertices[0].x ?? 0 }));
                        mapped.sort((a,b) => a.x - b.x);
                        let finalNumbers = [...new Set(mapped.map(m => m.text))];
                        if (finalNumbers.length > 0) {
                            searchBoxes.forEach(box => box.value = "");
                            finalNumbers.slice(0, 5).forEach((num, idx) => { searchBoxes[idx].value = num; });
                            document.getElementById('detected-tag-status').innerText = `AUTO DETECTED: ${finalNumbers.length} NUMS`;
                            saveCurrentSlotsToCloud(); 
                        }
                    }
                    document.getElementById('question-camera-input').value = '';
                })
                .catch(() => { loading.style.display = 'none'; });
            };
            reader.readAsDataURL(file);
        }

        function executeSearch() {
            const summaryArea = document.getElementById('summary-gallery-area');
            summaryArea.innerHTML = ''; 
            clearSlotResults();
            let matchedCount = 0;

            searchBoxes.forEach((box, index) => {
                const query = box.value.trim();
                const resSpan = document.getElementById(`res-${index}`);
                if (!query) { createEmptySummaryCard(summaryArea, "---"); return; }

                let foundMatch = null;
                for (let i = allPhotosData.length - 1; i >= 0; i--) {
                    const photo = allPhotosData[i];
                    const match = photo.blocks.find(b => b.number === query);
                    if (match) { foundMatch = match; break; }
                }

                if (foundMatch) {
                    matchedCount++;
                    resSpan.innerText = foundMatch.alphabet.toUpperCase(); 

                    const card = document.createElement('div');
                    card.className = 'summary-card';
                    card.innerHTML = `<div class="summary-header">${query}</div>`;

                    const canvasWrapper = document.createElement('div');
                    canvasWrapper.className = 'summary-canvas-wrapper';
                    
                    if (foundMatch.croppedImg) {
                        canvasWrapper.innerHTML = `<img src="${foundMatch.croppedImg}">`;
                    } else {
                        canvasWrapper.innerHTML = `<span style="font-size:9px;color:#aaa;">IMAGE ERR</span>`;
                    }
                    card.appendChild(canvasWrapper);
                    summaryArea.appendChild(card);
                } else {
                    resSpan.innerText = "ERR";
                    createEmptySummaryCard(summaryArea, query, true);
                }
            });

            if (matchedCount === 0 && Array.from(searchBoxes).every(b => !b.value.trim())) {
                initSummaryAreaPlaceholder();
            }
        }

        function createEmptySummaryCard(container, labelText, isError = false) {
            const card = document.createElement('div');
            card.className = 'summary-card';
            card.style.borderColor = isError ? '#ff3333' : 'rgba(140, 200, 255, 0.15)';
            card.innerHTML = `
                <div class="summary-header" style="color:${isError ? '#ff3333':'rgba(140,200,255,0.4)'}">${labelText}</div>
                <div class="summary-canvas-wrapper" style="height:45px; display:flex; align-items:center; justify-content:center;">
                    <span style="font-size:10px; color:${isError ? '#ff3333':'rgba(140,200,255,0.2)'};">${isError ? 'ERR':'VOID'}</span>
                </div>`;
            container.appendChild(card);
        }

        function initSummaryAreaPlaceholder() {
            document.getElementById('summary-gallery-area').innerHTML = '<div style="font-size:11px;color:#6688aa;padding:10px;grid-column:span 5;text-align:center;">同期・検索されると結果がここに表示されます</div>';
        }

        function clearSlotResults() {
            for(let i=0; i<5; i++) { if(document.getElementById(`res-${i}`)) document.getElementById(`res-${i}`).innerText = ""; }
        }

        async function resetSystem() {
            if (!confirm("【警告】お部屋全体の共有データを完全リセットしますか？相手のデータも消去されます。")) return;
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            try {
                await deleteDoc(doc(db, "rooms", roomId));
                allPhotosData = [];
                searchBoxes.forEach(box => box.value = "");
                clearSlotResults();
                initSummaryAreaPlaceholder();
                alert("ルーム内のデータをリセットしました。");
                setTimeout(reportPresence, 500); // リセット後に自分を再登録
            } catch(e) { alert("リセットエラー"); }
        }

        function saveConfig() {
            localStorage.setItem('cyber_ocr_api_key', document.getElementById('api-key').value);
            localStorage.setItem('cyber_room_id', document.getElementById('room-id').value);
            localStorage.setItem('cyber_user_name', document.getElementById('user-name').value);
        }
        function loadConfig() {
            const savedKey = localStorage.getItem('cyber_ocr_api_key');
            if (savedKey) document.getElementById('api-key').value = savedKey;
            const savedRoom = localStorage.getItem('cyber_room_id');
            document.getElementById('room-id').value = savedRoom || "team1";
            const savedName = localStorage.getItem('cyber_user_name');
            document.getElementById('user-name').value = savedName || "";
        }
    </script>
</head>
<body>

    <h1>絶望要塞IG かくれんぼツール</h1>

    <!-- リアルタイムメンバー確認バー -->
    <div class="member-status-bar">
        <span class="online-dot"></span>
        <span id="member-list-text">ONLINE: 待機中...</span>
    </div>

    <!-- 設定ボックス (3カラム化) -->
    <div class="config-box">

            <label>ROOM ID:</label>

        </div>
        <div>
            <label>YOUR NAME:</label>

        </div>
        <div>

            <input type="password" id="api-key" placeholder="AIzaSy...">
        </div>
    </div>

    <div class="section-title">
        <span>【01】検索エリア撮影 (自動同期)</span>
        <span id="db-counter" style="color:#8cc8ff;">STOCKS: 0</span>
    </div>
    
    <div class="camera-container">
        <video id="camera-stream" autoplay playsinline muted></video>
        <div class="loading-dimmer" id="scan-indicator"></div>
    </div>

    <div class="shutter-panel">
        <button class="btn-shutter" id="shutter-trigger">スキャン</button>
    </div>

    <div class="log-carousel" id="log-carousel"></div>

    <div class="section-title">
        <span>【02】数字入力 (変更は相手に即時反映)</span>
        <span id="detected-tag-status" style="color:#b57cff; font-size:0.75rem;"></span>
    </div>

    <div id="target-loading">SCANNING QUESTION PATTERN...</div>

    <div class="search-inputs-list">
        <div class="search-row-item">
            <label>SLOT 01</label>
            <input type="tel" class="search-box" id="box-0" placeholder="---">
            <span class="slot-result-text" id="res-0"></span>
        </div>
        <div class="search-row-item">
            <label>SLOT 02</label>
            <input type="tel" class="search-box" id="box-1" placeholder="---">
            <span class="slot-result-text" id="res-1"></span>
        </div>
        <div class="search-row-item">
            <label>SLOT 03</label>
            <input type="tel" class="search-box" id="box-2" placeholder="---">
            <span class="slot-result-text" id="res-2"></span>
        </div>
        <div class="search-row-item">
            <label>SLOT 04</label>
            <input type="tel" class="search-box" id="box-3" placeholder="---">
            <span class="slot-result-text" id="res-3"></span>
        </div>
        <div class="search-row-item">
            <label>SLOT 05</label>
            <input type="tel" class="search-box" id="box-4" placeholder="---">
            <span class="slot-result-text" id="res-4"></span>
        </div>
    </div>

    <input type="file" id="question-camera-input" accept="image/*" style="display: none;">

    <div class="action-panel">
        <button class="btn-purple" onclick="document.getElementById('question-camera-input').click()">問題を撮影</button>
        <button class="btn-success" id="btn-search">検索する</button>
    </div>

    <div class="section-title">【03】答えを表示 (自動アップ対応)</div>
    <div id="summary-gallery-area" class="summary-gallery"></div>

    <button class="btn-reset" id="btn-reset-all">全てリセット</button>

    <canvas id="capture-canvas" style="display:none;"></canvas>
</body>
