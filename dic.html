<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Q 辞書ツール</title>
    <style>
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace, sans-serif; }
        
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0c0714; 
            color: #ebd6ff; 
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        .app-wrapper {
            padding: 4px;
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        /* トップバー */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(181, 124, 255, 0.2);
            height: 18px;
            margin-bottom: 4px;
        }
        h1 {
            font-size: 0.75rem;
            margin: 0;
            color: #b57cff;
            letter-spacing: 0px;
        }
        .config-box {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .config-box label { font-size: 0.55rem; color: #b57cff; font-weight: bold; }
        .config-box input {
            background: #140d21;
            border: 1px solid #b57cff;
            color: #00ff66;
            padding: 0px 2px;
            font-size: 0.6rem;
            border-radius: 2px;
            width: 80px;
            height: 14px;
        }

        /* メインレイアウト */
        .main-layout {
            display: flex;
            flex: 1;
            gap: 6px;
        }

        /* --- 左カラム: カメラ & スキャンボタン & 電卓 --- */
        .left-column {
            flex: 38;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
        }
        .camera-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            max-height: 55vh;
            margin: 0 auto;
            background: #000;
            border: 1.5px solid #b57cff;
            position: relative;
            border-radius: 4px;
            overflow: hidden;
        }
        #camera-stream { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-shutter {
            height: 30px;
            background: linear-gradient(135deg, #5500aa, #220055);
            color: #ebd6ff;
            border: 1.5px solid #b57cff;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-shutter:active { background: #00ff64; color: #000; }

        .btn-calc-toggle {
            height: 26px;
            background: #1a0d2e;
            color: #b57cff;
            border: 1px solid rgba(181, 124, 255, 0.5);
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-calc-toggle:active { background: #b57cff; color: #000; }

        /* 電卓パネル */
        .calc-panel-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 7, 20, 0.97);
            border-radius: 4px;
            z-index: 30;
            flex-direction: column;
            padding: 4px;
        }
        .calc-panel-overlay.active { display: flex; }
        .calc-display {
            background: #06030a;
            border: 1px solid #b57cff;
            border-radius: 4px;
            padding: 4px 6px;
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ff64;
            min-height: 32px;
            margin-bottom: 4px;
            overflow: hidden;
            white-space: nowrap;
        }
        .calc-keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3px;
            flex: 1;
        }
        .btn-calc-key {
            background: #1d0e30;
            border: 1px solid #b57cff;
            color: #ebd6ff;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-calc-key:active { background: #b57cff; color: #000; }
        .btn-calc-key.op { background: #2b124c; border-color: #ff007f; color: #ff007f; }
        .btn-calc-key.op:active { background: #ff007f; color: #000; }
        .btn-calc-key.eq { background: #3a1525; border-color: #ff3388; color: #ff99cc; }
        .btn-calc-key.eq:active { background: #ff3388; color: #fff; }
        .btn-calc-key.cl { background: #3a1525; border-color: #ff3388; color: #ff99cc; font-size: 0.7rem; }
        .btn-calc-key.cl:active { background: #ff3388; color: #fff; }
        .btn-calc-close {
            background: #333;
            border: none;
            color: #aaa;
            padding: 3px;
            font-size: 0.6rem;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 3px;
        }
        .btn-calc-close:active { background: #555; color: #fff; }

        /* --- 右カラム --- */
        .right-column {
            flex: 62;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .section-title {
            font-size: 0.55rem;
            font-weight: bold;
            color: #b57cff;
            margin-bottom: 1px;
        }

        /* スロット表示エリア */
        .slots-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }
        .slot-box {
            background: #150f24;
            border: 1px solid rgba(181, 124, 255, 0.4);
            border-radius: 4px;
            padding: 1px 0px;
            text-align: center;
            display: flex;
            flex-direction: column;
        }
        .slot-box.selected {
            border: 1px solid #ff007f;
            background: #2b0c1e;
        }
        .slot-box .label { font-size: 0.5rem; color: #b57cff; pointer-events: none; }
        .slot-box.selected .label { color: #ff007f; }
        .slot-box .kanji-display {
            font-size: 0.95rem;
            color: #ffffff;
            font-weight: bold;
            min-height: 1.1rem;
            line-height: 1.1rem;
            pointer-events: none;
        }
        .slot-box .page-output {
            font-size: 0.75rem;
            font-weight: bold;
            color: #00ff64;
            min-height: 0.85rem;
            pointer-events: none;
        }

        /* エリア */
        .suggest-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed rgba(181, 124, 255, 0.2);
            padding: 2px 4px;
            border-radius: 4px;
            min-height: 22px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .suggest-title { font-size: 0.5rem; color: #aaa; white-space: nowrap; }
        .suggest-buttons { display: flex; flex-wrap: wrap; gap: 3px; flex: 1; }
        .btn-suggest {
            background: #25163a;
            border: 1px solid #b57cff;
            color: #ebd6ff;
            padding: 1px 4px;
            font-size: 0.6rem;
            border-radius: 2px;
            cursor: pointer;
        }
        .btn-suggest:active { background: #00ff64; color: #000; }

        /* 手入力検索コントロール */
        .manual-search-container {
            background: rgba(26, 11, 46, 0.4);
            border: 1px solid rgba(181, 124, 255, 0.3);
            padding: 2px 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .manual-search-input {
            flex: 1;
            background: #140d21;
            border: 1px solid #b57cff;
            color: #ffffff;
            padding: 2px;
            font-size: 0.7rem;
            border-radius: 2px;
            text-align: center;
            font-weight: bold;
            height: 18px;
        }
        .btn-manual-submit {
            background: #4a1c6d;
            border: 1px solid #b57cff;
            color: #ebd6ff;
            padding: 0px 10px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 2px;
            cursor: pointer;
            height: 18px;
        }
        .btn-manual-submit:active { background: #00ff64; color: #000; }

        /* --- 計算コントロールセンター --- */
        .calc-panel {
            background: rgba(27, 15, 46, 0.6);
            border: 1px solid rgba(181, 124, 255, 0.3);
            border-radius: 4px;
            padding: 4px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        .calc-main-row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex: 1;
        }
        
        .result-display {
            flex: 1;
            aspect-ratio: 1 / 1;
            background: #06030a;
            border: 1px solid #b57cff;
            border-radius: 4px;
            padding: 2px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .result-display .res-title { 
            font-size: 0.45rem; 
            color: #b57cff; 
            line-height: 0.6rem; 
        }
        .result-display .res-num { 
            font-size: 1.25rem; 
            font-weight: bold; 
            color: #ff007f; 
            text-shadow: 0 0 6px #ff007f; 
            line-height: 1.1rem; 
        }
        
        .calc-buttons {
            flex: 5;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }
        .btn-calc {
            background: #2b124c;
            border: 1.5px solid #ff007f;
            color: #ff007f;
            font-size: 0.6rem;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1 / 1;
            width: 100%;
            height: auto;
        }
        .btn-calc:active { background: #ff007f; color: #000; }
        
        .reset-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 6px;
        }
        .btn-reset-half {
            background: #3a1525;
            border: 1px solid #ff3388;
            color: #ff99cc;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 28px;
        }
        .btn-reset-half:active { background: #ff3388; color: #fff; }

        /* 余りセレクターオーバーレイ */
        .mod-selector-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 7, 20, 0.95);
            border-radius: 4px;
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4px;
        }
        .mod-selector-title {
            font-size: 0.6rem;
            color: #ff007f;
            margin-bottom: 3px;
            font-weight: bold;
        }
        .mod-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            width: 100%;
        }
        .btn-mod-num {
            background: #1d0e30;
            border: 1px solid #b57cff;
            color: #00ff66;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            padding: 4px 0;
        }
        .btn-mod-num:active { background: #00ff66; color: #000; }
        .btn-mod-cancel {
            grid-column: span 5;
            background: #333;
            border: none;
            color: #fff;
            padding: 2px;
            font-size: 0.6rem;
            border-radius: 3px;
            margin-top: 2px;
        }

        .loading-dimmer {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 5, 35, 0.5); z-index: 10; justify-content: center; align-items: center;
            font-size: 0.7rem; color: #00ff66;
        }
        .loading-dimmer::after { content: "SCANNING KANJI..."; animation: blink 0.5s infinite alternate; }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-wrapper">

        <!-- スリムバー -->
        <div class="top-bar">
            <h1>Q 辞書ツール</h1>
            <div class="config-box">
                <label>API PASS:</label>
                <input type="password" id="api-key" placeholder="AIzaSy...">
            </div>
        </div>

        <div class="main-layout">
            
            <!-- 左カラム -->
            <div class="left-column">
                <div class="camera-container">
                    <video id="camera-stream" autoplay playsinline muted></video>
                    <div class="loading-dimmer" id="scan-indicator"></div>
                </div>
                <button class="btn-shutter" id="shutter-trigger">スキャン</button>
                <button class="btn-calc-toggle" id="calc-toggle-btn">電卓</button>

                <!-- 電卓パネル -->
                <div class="calc-panel-overlay" id="calc-panel-overlay">
                    <div class="calc-display" id="calc-display">0</div>
                    <div class="calc-keypad">
                        <button class="btn-calc-key cl" onclick="calcKey('C')">C</button>
                        <button class="btn-calc-key op" onclick="calcKey('÷')">÷</button>
                        <button class="btn-calc-key op" onclick="calcKey('×')">×</button>
                        <button class="btn-calc-key op" onclick="calcKey('−')">−</button>
                        <button class="btn-calc-key" onclick="calcKey('7')">7</button>
                        <button class="btn-calc-key" onclick="calcKey('8')">8</button>
                        <button class="btn-calc-key" onclick="calcKey('9')">9</button>
                        <button class="btn-calc-key op" onclick="calcKey('+')">+</button>
                        <button class="btn-calc-key" onclick="calcKey('4')">4</button>
                        <button class="btn-calc-key" onclick="calcKey('5')">5</button>
                        <button class="btn-calc-key" onclick="calcKey('6')">6</button>
                        <button class="btn-calc-key eq" onclick="calcKey('=')" style="grid-row: span 4;">＝</button>
                        <button class="btn-calc-key" onclick="calcKey('1')">1</button>
                        <button class="btn-calc-key" onclick="calcKey('2')">2</button>
                        <button class="btn-calc-key" onclick="calcKey('3')">3</button>
                        <button class="btn-calc-key" onclick="calcKey('0')" style="grid-column: span 2;">0</button>
                    </div>
                    <button class="btn-calc-close" onclick="closeCalcPanel()">閉じる</button>
                </div>
            </div>

            <!-- 右カラム -->
            <div class="right-column">
                
                <!-- スロット -->
                <div>
                    <div class="section-title">【スロット】タップ固定</div>
                    <div class="slots-container">
                        <div class="slot-box" id="slot-container-0" onclick="toggleSlotSelect(0)">
                            <span class="label">S1</span>
                            <div class="kanji-display" id="slot-k-0">-</div>
                            <span class="page-output" id="slot-p-0">---</span>
                        </div>
                        <div class="slot-box" id="slot-container-1" onclick="toggleSlotSelect(1)">
                            <span class="label">S2</span>
                            <div class="kanji-display" id="slot-k-1">-</div>
                            <span class="page-output" id="slot-p-1">---</span>
                        </div>
                        <div class="slot-box" id="slot-container-2" onclick="toggleSlotSelect(2)">
                            <span class="label">S3</span>
                            <div class="kanji-display" id="slot-k-2">-</div>
                            <span class="page-output" id="slot-p-2">---</span>
                        </div>
                        <div class="slot-box" id="slot-container-3" onclick="toggleSlotSelect(3)">
                            <span class="label">S4</span>
                            <div class="kanji-display" id="slot-k-3">-</div>
                            <span class="page-output" id="slot-p-3">---</span>
                        </div>
                    </div>
                </div>

                <!-- サジェスト -->
                <div class="suggest-container">
                    <div class="suggest-title">候補:</div>
                    <div class="suggest-buttons" id="suggest-area">
                        <span style="color:rgba(181,124,255,0.3); font-size:0.55rem;">ここに並びます</span>
                    </div>
                </div>

                <!-- 手入力 -->
                <div class="manual-search-container">
                    <input type="text" class="manual-search-input" id="manual-kanji-input" maxlength="1" placeholder="未認識時の手入力">
                    <button class="btn-manual-submit" onclick="submitManualKanji()">登録</button>
                </div>

                <!-- 計算パネル -->
                <div class="calc-panel">
                    <div class="mod-selector-overlay" id="mod-overlay">
                        <div class="mod-selector-title">最大ページ数を何で割る？</div>
                        <div class="mod-grid">
                            <button class="btn-mod-num" onclick="execModCalculated(1)">1</button>
                            <button class="btn-mod-num" onclick="execModCalculated(2)">2</button>
                            <button class="btn-mod-num" onclick="execModCalculated(3)">3</button>
                            <button class="btn-mod-num" onclick="execModCalculated(4)">4</button>
                            <button class="btn-mod-num" onclick="execModCalculated(5)">5</button>
                            <button class="btn-mod-num" onclick="execModCalculated(6)">6</button>
                            <button class="btn-mod-num" onclick="execModCalculated(7)">7</button>
                            <button class="btn-mod-num" onclick="execModCalculated(8)">8</button>
                            <button class="btn-mod-num" onclick="execModCalculated(9)">9</button>
                            <button class="btn-mod-cancel" onclick="closeModOverlay()">戻る</button>
                        </div>
                    </div>

                    <div class="calc-main-row">
                        <div class="result-display">
                            <div class="res-title">ANS</div>
                            <div class="res-num" id="calc-result">000</div>
                        </div>
                        <div class="calc-buttons">
                            <button class="btn-calc" onclick="calculate('add')">➕ 足</button>
                            <button class="btn-calc" onclick="calculate('sub')">➖ 引</button>
                            <button class="btn-calc" onclick="calculate('double')">✖2 倍</button>
                            <button class="btn-calc" onclick="calculate('rem')">剰 余</button>
                            <button class="btn-calc" onclick="calculate('sort_digits')">🔁 替</button>
                        </div>
                    </div>
                    
                    <div class="reset-container">
                        <button class="btn-reset-half" id="btn-clear-slots">スロットクリア</button>
                        <button class="btn-reset-half" id="btn-clear-result">結果クリア</button>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <canvas id="capture-canvas" style="display:none;"></canvas>

            "飆":1282,"飴":1286,"餅":1287,"首":1290,"馮":1293,"駐":1296,"騰":1298,"髪":1305,"髭":1305,
            "鬨":1306,"鮭":1312,"鳴":1319,"鸞":1326,"麾":1330,"黄":1331,"黐":1332,"黶":1334
        };

        let streamObject = null;
        let selectedSlots = new Set();
        
        const displays = [
            document.getElementById('slot-k-0'), document.getElementById('slot-k-1'),
            document.getElementById('slot-k-2'), document.getElementById('slot-k-3')
        ];
        const outputs = [
            document.getElementById('slot-p-0'), document.getElementById('slot-p-1'),
            document.getElementById('slot-p-2'), document.getElementById('slot-p-3')
        ];
        const containers = [
            document.getElementById('slot-container-0'), document.getElementById('slot-container-1'),
            document.getElementById('slot-container-2'), document.getElementById('slot-container-3')
        ];

        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('page_ocr_api_key');
            if (savedKey) document.getElementById('api-key').value = savedKey;

            initCameraStream();

            document.getElementById('shutter-trigger').addEventListener('click', captureAndScan);
            document.getElementById('btn-clear-slots').addEventListener('click', clearSlotsOnly);
            document.getElementById('btn-clear-result').addEventListener('click', clearResultOnly);
            document.getElementById('calc-toggle-btn').addEventListener('click', toggleCalcPanel);

            document.getElementById('api-key').addEventListener('change', () => {
                localStorage.setItem('page_ocr_api_key', document.getElementById('api-key').value);
            });
        });

        async function initCameraStream() {
            const video = document.getElementById('camera-stream');
            try {
                const constraints = {
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                };
                streamObject = await navigator.mediaDevices.getUserMedia(constraints)
                    .catch(() => navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                        audio: false
                    }))
                    .catch(() => navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false }))
                    .catch(() => navigator.mediaDevices.getUserMedia({ video: true, audio: false }));
                video.srcObject = streamObject;
            } catch (err) { alert("カメラ起動失敗: " + err.message); }
        }

        window.toggleSlotSelect = function(idx) {
            if (selectedSlots.has(idx)) {
                selectedSlots.delete(idx);
                containers[idx].classList.remove('selected');
            } else {
                selectedSlots.add(idx);
                containers[idx].classList.add('selected');
            }
        }

        function clearAllSelections() {
            selectedSlots.clear();
            containers.forEach(c => c.classList.remove('selected'));
        }

        window.submitManualKanji = function() {
            const inputEl = document.getElementById('manual-kanji-input');
            const kanji = inputEl.value.trim();
            
            if (!kanji) return;

            let targetIdx = -1;
            for (let i = 0; i < 4; i++) {
                if (!selectedSlots.has(i) && (displays[i].innerText === "-" || !displays[i].innerText)) {
                    targetIdx = i;
                    break;
                }
            }
            if (targetIdx === -1) {
                for (let i = 0; i < 4; i++) {
                    if (!selectedSlots.has(i)) { targetIdx = i; break; }
                }
            }
            if (targetIdx === -1) {
                alert("全てホールドされています");
                return;
            }

            displays[targetIdx].innerText = kanji;
            if (KANJI_DICTIONARY[kanji]) {
                outputs[targetIdx].innerText = KANJI_DICTIONARY[kanji];
            } else {
                outputs[targetIdx].innerText = "未登録";
            }

            inputEl.value = "";
            inputEl.blur();
        }

        function preprocessCapture(video) {
            const canvas = document.getElementById('capture-canvas');

            const vw = video.videoWidth || 1920;
            const vh = video.videoHeight || 1080;

            const UPSCALE = 2;
            canvas.width = vw * UPSCALE;
            canvas.height = vh * UPSCALE;

            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            let minLum = 255, maxLum = 0;
            for (let i = 0; i < data.length; i += 4) {
                const lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                if (lum < minLum) minLum = lum;
                if (lum > maxLum) maxLum = lum;
            }

            const range = Math.max(1, maxLum - minLum);
            for (let i = 0; i < data.length; i += 4) {
                const lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                const stretched = ((lum - minLum) / range) * 255;
                const ratio = lum > 0 ? stretched / lum : 1;
                data[i]     = Math.min(255, Math.max(0, data[i] * ratio));
                data[i + 1] = Math.min(255, Math.max(0, data[i + 1] * ratio));
                data[i + 2] = Math.min(255, Math.max(0, data[i + 2] * ratio));
            }
            ctx.putImageData(imgData, 0, 0);

            const blurred = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const bData = blurred.data;
            const w = canvas.width;
            const h = canvas.height;
            const copy = new Uint8ClampedArray(bData);

            const kernel = [1, 2, 1, 2, 4, 2, 1, 2, 1];
            const kSum = 16;
            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const idx = (y * w + x) * 4;
                    for (let c = 0; c < 3; c++) {
                        let val = 0;
                        let ki = 0;
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                const nIdx = ((y + dy) * w + (x + dx)) * 4 + c;
                                val += copy[nIdx] * kernel[ki++];
                            }
                        }
                        bData[idx + c] = val / kSum;
                    }
                }
            }

            const amount = 1.5;
            const orig = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const oData = orig.data;
            for (let i = 0; i < oData.length; i += 4) {
                for (let c = 0; c < 3; c++) {
                    const sharp = oData[i + c] + amount * (oData[i + c] - bData[i + c]);
                    oData[i + c] = Math.min(255, Math.max(0, sharp));
                }
            }
            ctx.putImageData(orig, 0, 0);

            return canvas.toDataURL('image/jpeg', 0.92).replace(/^data:image\/jpeg;base64,/, "");
        }

        async function captureAndScan() {
            const video = document.getElementById('camera-stream');
            const apiKey = document.getElementById('api-key').value.trim();

            if (!apiKey) return alert("PASSを入力してください。");
            if (!video.srcObject) return alert("カメラ未準備");

            const indicator = document.getElementById('scan-indicator');
            indicator.style.display = 'flex';

            try {
                const base64Image = preprocessCapture(video);

                const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        requests: [{
                            image: { content: base64Image },
                            features: [
                                { type: "TEXT_DETECTION", model: "builtin/stable" }
                            ],
                            imageContext: {
                                languageHints: ["ja", "ja-t-i0-handwrit"]
                            }
                        }]
                    })
                });
                const data = await response.json();
                const resp = data.responses[0];

                const fullText = resp?.textAnnotations?.[0]?.description || "";
                const symbolChars = [];
                if (resp?.textAnnotations) {
                    for (let i = 1; i < resp.textAnnotations.length; i++) {
                        const desc = resp.textAnnotations[i].description || "";
                        for (let ch of desc) {
                            if (ch.trim()) symbolChars.push(ch);
                        }
                    }
                }

                processDetectedText(fullText, symbolChars);
            } catch (e) { 
                alert("スキャンエラー"); 
            } finally {
                indicator.style.display = 'none';
            }
        }

        function processDetectedText(text, symbolChars) {
            if (!symbolChars) symbolChars = [];

            const regex = /[「『](.*?)[」』]/g;
            let rawMatches = [];
            let match;
            while ((match = regex.exec(text)) !== null) {
                if (match[1]) {
                    for (let char of match[1]) {
                        if (char.trim()) rawMatches.push(char);
                    }
                }
            }

            if (rawMatches.length === 0) {
                for (let char of text) {
                    if (KANJI_DICTIONARY[char] || char === "下" || char === "開") {
                        rawMatches.push(char);
                    }
                }
            }

            for (let char of symbolChars) {
                if (KANJI_DICTIONARY[char] && !rawMatches.includes(char)) {
                    rawMatches.push(char);
                }
            }

            let forceSuggestShita = false;
            let forceSuggestHiraki = false;
            let processedMatches = [];

            rawMatches.forEach(char => {
                if (char === "下" || char === "卞") {
                    processedMatches.push("卞");
                    forceSuggestShita = true;
                } else if (char === "開" || char === "鬨") {
                    processedMatches.push("鬨");
                    forceSuggestHiraki = true;
                } else {
                    processedMatches.push(char);
                }
            });

            for (let i = 0; i < 4; i++) {
                if (!selectedSlots.has(i)) {
                    displays[i].innerText = "-";
                    outputs[i].innerText = "---";
                }
            }

            processedMatches.forEach(char => {
                if (!KANJI_DICTIONARY[char]) return;

                let isDuplicate = false;
                for (let i = 0; i < 4; i++) {
                    if (displays[i].innerText === char) { isDuplicate = true; break; }
                }
                if (isDuplicate) return;

                let targetIdx = -1;
                for (let i = 0; i < 4; i++) {
                    if (!selectedSlots.has(i) && (displays[i].innerText === "-" || !displays[i].innerText)) {
                        targetIdx = i;
                        break;
                    }
                }

                if (targetIdx !== -1) {
                    displays[targetIdx].innerText = char;
                    outputs[targetIdx].innerText = KANJI_DICTIONARY[char];
                }
            });

            generateSuggestions(text, symbolChars, forceSuggestShita, forceSuggestHiraki);
        }

        function generateSuggestions(targetText, symbolChars, forceSuggestShita, forceSuggestHiraki) {
            const suggestArea = document.getElementById('suggest-area');
            suggestArea.innerHTML = "";

            let uniqueCandidates = [];

            if (forceSuggestShita && KANJI_DICTIONARY["下"]) uniqueCandidates.push("下");
            if (forceSuggestHiraki && KANJI_DICTIONARY["開"]) uniqueCandidates.push("開");

            if (symbolChars) {
                for (let ch of symbolChars) {
                    if (KANJI_DICTIONARY[ch] && !uniqueCandidates.includes(ch)) {
                        let inSlot = false;
                        for (let i = 0; i < 4; i++) {
                            if (displays[i].innerText === ch) { inSlot = true; break; }
                        }
                        if (!inSlot) uniqueCandidates.push(ch);
                    }
                    if (uniqueCandidates.length >= 4) break;
                }
            }

            const dictionaryKanjiList = Object.keys(KANJI_DICTIONARY);
            let candidates = [];

            let allSourceChars = [];
            for (let ch of targetText) allSourceChars.push(ch);
            if (symbolChars) for (let ch of symbolChars) allSourceChars.push(ch);

            dictionaryKanjiList.forEach(dictK => {
                if (dictK === "下" && forceSuggestShita) return;
                if (dictK === "開" && forceSuggestHiraki) return;
                if (uniqueCandidates.includes(dictK)) return;

                for (let rawChar of allSourceChars) {
                    const codeDiff = Math.abs(dictK.charCodeAt(0) - rawChar.charCodeAt(0));
                    if (codeDiff === 0) continue;
                    
                    let score = 0;
                    if (codeDiff < 100) score += 40;
                    else if (codeDiff < 500) score += 20;

                    if (score > 0) {
                        candidates.push({ kanji: dictK, score: score + (1000 / (codeDiff + 1)) });
                    }
                }
            });

            candidates.sort((a, b) => b.score - a.score);
            
            for (let c of candidates) {
                if (!uniqueCandidates.includes(c.kanji)) {
                    uniqueCandidates.push(c.kanji);
                }
                if (uniqueCandidates.length >= 4) break;
            }

            if (uniqueCandidates.length < 4 && !uniqueCandidates.includes("謦")) uniqueCandidates.push("謦");

            const finalCandidates = uniqueCandidates.slice(0, 4);

            finalCandidates.forEach(kanji => {
                if (!KANJI_DICTIONARY[kanji]) return;
                const btn = document.createElement('button');
                btn.className = 'btn-suggest';
                btn.innerText = `${kanji}(${KANJI_DICTIONARY[kanji]}p)`;
                btn.onclick = () => {
                    let targetIdx = 0;
                    for (let i = 0; i < 4; i++) {
                        if (!selectedSlots.has(i) && (displays[i].innerText === "-" || !displays[i].innerText)) { 
                            targetIdx = i; 
                            break; 
                        }
                    }
                    displays[targetIdx].innerText = kanji;
                    outputs[targetIdx].innerText = KANJI_DICTIONARY[kanji];
                };
                suggestArea.appendChild(btn);
            });

            if (finalCandidates.length === 0) {
                suggestArea.innerHTML = '<span style="color:rgba(181,124,255,0.3); font-size:0.55rem;">候補なし</span>';
            }
        }

        window.calculate = function(type) {
            let allPages = [];
            for (let i = 0; i < 4; i++) {
                const pVal = parseInt(outputs[i].innerText);
                if (!isNaN(pVal)) allPages.push(pVal);
            }

            if (type === 'double') {
                if (allPages.length === 0) { document.getElementById('calc-result').innerText = "ERR"; return; }
                const maxNum = Math.max(...allPages);
                document.getElementById('calc-result').innerText = maxNum * 2;
                clearAllSelections();
                return;
            }

            if (type === 'sort_digits') {
                if (allPages.length === 0) { document.getElementById('calc-result').innerText = "ERR"; return; }
                allPages.sort((a, b) => b - a);
                let combinedResult = "";
                allPages.forEach(p => { combinedResult += (p % 10).toString(); });
                document.getElementById('calc-result').innerText = combinedResult;
                clearAllSelections();
                return;
            }

            if (type === 'sub') {
                if (allPages.length < 1) { document.getElementById('calc-result').innerText = "ERR"; return; }
                const maxNum = Math.max(...allPages);
                const minNum = Math.min(...allPages);
                document.getElementById('calc-result').innerText = maxNum - minNum;
                clearAllSelections();
                return;
            }

            if (type === 'rem') {
                if (allPages.length === 0) { alert("数値がありません"); return; }
                document.getElementById('mod-overlay').style.display = 'flex';
                return;
            }

            let pages = [];
            selectedSlots.forEach(idx => {
                const pVal = parseInt(outputs[idx].innerText);
                if (!isNaN(pVal)) pages.push(pVal);
            });

            if (pages.length === 0 && type === 'add') pages = [...allPages];
            if (pages.length === 0) { document.getElementById('calc-result').innerText = "ERR"; return; }

            let result = 0;
            if (type === 'add') result = pages.reduce((a, b) => a + b, 0);

            document.getElementById('calc-result').innerText = result;
            clearAllSelections();
        }

        window.execModCalculated = function(divisor) {
            let allPages = [];
            for (let i = 0; i < 4; i++) {
                const pVal = parseInt(outputs[i].innerText);
                if (!isNaN(pVal)) allPages.push(pVal);
            }
            if (allPages.length === 0) { closeModOverlay(); return; }

            const maxPage = Math.max(...allPages);
            document.getElementById('calc-result').innerText = maxPage % divisor;
            closeModOverlay();
            clearAllSelections();
        }

        window.closeModOverlay = function() {
            document.getElementById('mod-overlay').style.display = 'none';
        }

        function clearSlotsOnly() {
            displays.forEach(disp => disp.innerText = "-");
            outputs.forEach(out => out.innerText = "---");
            clearAllSelections();
            document.getElementById('suggest-area').innerHTML = '<span style="color:rgba(181,124,255,0.3); font-size:0.55rem;">クリアしました</span>';
        }

        function clearResultOnly() {
            document.getElementById('calc-result').innerText = "000";
            closeModOverlay();
        }

        /* --- 電卓機能 --- */
        let calcCurrent = "0";
        let calcPrevious = null;
        let calcOperator = null;
        let calcShouldReset = false;

        function toggleCalcPanel() {
            const panel = document.getElementById('calc-panel-overlay');
            panel.classList.toggle('active');
        }

        window.closeCalcPanel = function() {
            document.getElementById('calc-panel-overlay').classList.remove('active');
        }

        window.calcKey = function(key) {
            const display = document.getElementById('calc-display');

            if (key === 'C') {
                calcCurrent = "0";
                calcPrevious = null;
                calcOperator = null;
                calcShouldReset = false;
                display.innerText = "0";
                return;
            }

            if (key === '=') {
                if (calcOperator !== null && calcPrevious !== null) {
                    const a = parseFloat(calcPrevious);
                    const b = parseFloat(calcCurrent);
                    let result = 0;
                    if (calcOperator === '+') result = a + b;
                    else if (calcOperator === '−') result = a - b;
                    else if (calcOperator === '×') result = a * b;
                    else if (calcOperator === '÷') result = b !== 0 ? a / b : 0;
                    calcCurrent = String(result);
                    calcPrevious = null;
                    calcOperator = null;
                    calcShouldReset = true;
                    display.innerText = calcCurrent;
                }
                return;
            }

            if (key === '+' || key === '−' || key === '×' || key === '÷') {
                if (calcOperator !== null && calcPrevious !== null && !calcShouldReset) {
                    const a = parseFloat(calcPrevious);
                    const b = parseFloat(calcCurrent);
                    let result = 0;
                    if (calcOperator === '+') result = a + b;
                    else if (calcOperator === '−') result = a - b;
                    else if (calcOperator === '×') result = a * b;
                    else if (calcOperator === '÷') result = b !== 0 ? a / b : 0;
                    calcCurrent = String(result);
                }
                calcPrevious = calcCurrent;
                calcOperator = key;
                calcShouldReset = true;
                display.innerText = calcCurrent;
                return;
            }

            if (/[0-9]/.test(key)) {
                if (calcCurrent === "0" || calcShouldReset) {
                    calcCurrent = key;
                    calcShouldReset = false;
                } else {
                    calcCurrent += key;
                }
                display.innerText = calcCurrent;
            }
        }
    </script>
