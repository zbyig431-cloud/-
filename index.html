<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>絶望要塞IG かくれんぼツール</title>
    <style>
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace, sans-serif; }
        body { 
            background-color: #070f14; 
            color: #d6f0ff; 
            margin: 0; 
            padding: 15px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        h1 {
            font-size: 1.3rem;
            text-align: center;
            margin: 0 0 12px 0;
            color: #00bfff;
            text-shadow: 0 0 8px rgba(0, 191, 255, 0.6);
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(0, 191, 255, 0.3);
            padding-bottom: 5px;
        }

        .config-box {
            background: rgba(0, 191, 255, 0.05);
            border: 1px solid rgba(0, 191, 255, 0.2);
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .config-box label { font-size: 0.7rem; color: #00bfff; font-weight: bold; }
        .config-box input {
            width: 100%;
            background: #0d161e;
            border: 1px solid #00bfff;
            color: #00ff66;
            padding: 6px;
            font-size: 0.85rem;
            border-radius: 2px;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: #00bfff;
            margin-bottom: 8px;
            text-shadow: 0 0 5px rgba(0, 191, 255, 0.4);
        }

        /* 2つのカメラ切り替えタブ、またはエリア */
        .camera-switch-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .btn-tab {
            background: #0b1a24;
            border: 1px solid #00bfff;
            color: #00bfff;
            padding: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-tab.active {
            background: #00bfff;
            color: #000;
            box-shadow: 0 0 10px rgba(0, 191, 255, 0.5);
        }

        .camera-container {
            width: 100%;
            background: #000;
            border: 2px solid #00bfff;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.2);
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
            aspect-ratio: 4 / 3;
        }

        #camera-stream { width: 100%; height: 100%; object-fit: cover; }

        .btn-shutter {
            width: 100%;
            background: linear-gradient(135deg, #005588, #002244);
            color: #d6f0ff;
            border: 2px solid #00bfff;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 191, 255, 0.4);
            text-shadow: 0 0 5px #d6f0ff;
            margin-bottom: 15px;
        }
        .btn-shutter:active {
            background: #00ff64;
            color: #000;
            border-color: #ffffff;
            box-shadow: 0 0 15px #00ff64;
        }

        /* 手入力・検索・結果表示集約エリア */
        .search-panel {
            background: rgba(11, 26, 36, 0.6);
            border: 1px solid rgba(0, 191, 255, 0.3);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .search-input {
            flex: 1;
            background: #0d161e;
            border: 1px solid #00bfff;
            color: #ffffff;
            padding: 10px;
            font-size: 1.3rem;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .search-input:focus { outline: none; border-color: #00ff66; box-shadow: 0 0 8px rgba(0,255,102,0.5); }

        .result-display {
            background: #03070a;
            border: 2px solid #ff0055;
            border-radius: 4px;
            padding: 15px;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(255, 0, 85, 0.2);
        }
        .result-display .res-title { font-size: 0.75rem; color: #ff0055; margin-bottom: 4px; letter-spacing: 1px; font-weight: bold; }
        .result-display .res-char { font-size: 3.5rem; font-weight: bold; color: #ffffff; text-shadow: 0 0 20px #ff0055; line-height: 1; }

        .loading-dimmer {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 20, 35, 0.6); z-index: 10; justify-content: center; align-items: center;
            font-size: 0.9rem; color: #00ff66; text-shadow: 0 0 5px #00ff66; font-weight: bold;
        }
        .loading-dimmer::after { content: "TARGET TRACKING..."; animation: blink 0.5s infinite alternate; }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h1>絶望要塞IG かくれんぼツール</h1>

    <!-- 鍵設定 -->
    <div class="config-box">
        <label>VISION API PASS:</label>
        <input type="password" id="api-key" placeholder="AIzaSy...">
    </div>

    <!-- カメラモード切り替え（見た目のデザイン維持用、内部ロジックは統合スキャン可能） -->
    <div class="camera-switch-container">
        <button class="btn-tab active" id="tab-scan" onclick="setCameraMode('scan')">🎯 部分スキャンカメラ</button>
        <button class="btn-tab" id="tab-all" onclick="setCameraMode('all')">📸 全体撮影カメラ</button>
    </div>

    <!-- カメラ画面 -->
    <div class="camera-container">
        <video id="camera-stream" autoplay playsinline muted></video>
        <div class="loading-dimmer" id="scan-indicator"></div>
    </div>
    <button class="btn-shutter" id="shutter-trigger">ターゲット捕捉（スキャン）</button>

    <!-- メイン操作・結果パネル -->
    <div class="search-panel">
        <div class="section-title">🔍 ターゲット3桁数字（手入力 or 自動連動）</div>
        <div class="input-row">
            <input type="text" class="search-input" id="target-number-input" inputmode="numeric" pattern="[0-9]*" maxlength="3" placeholder="例: 012">
        </div>

        <div class="result-display">
            <div class="res-title">DETECTED ALPHABET</div>
            <div class="res-char" id="detected-alphabet-output">--</div>
        </div>
    </div>

    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script type="module">
        let currentMode = 'scan'; // 'scan' or 'all'
        let streamObject = null;

        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('hide_ocr_api_key');
            if (savedKey) document.getElementById('api-key').value = savedKey;

            initCameraStream();

            document.getElementById('shutter-trigger').addEventListener('click', captureAndProcess);
            document.getElementById('api-key').addEventListener('change', () => {
                localStorage.setItem('hide_ocr_api_key', document.getElementById('api-key').value);
            });

            // 手入力されたら即時、過去のデータ等から探す、あるいはクリアする等の処理用フック
            document.getElementById('target-number-input').addEventListener('input', (e) => {
                // 数字が手動で書き換えられたら、一旦アルファベット表示をリセット
                if(e.target.value.length < 3) {
                    document.getElementById('detected-alphabet-output').innerText = "--";
                }
            });
        });

        async function initCameraStream() {
            const video = document.getElementById('camera-stream');
            try {
                const constraints = {
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                };
                streamObject = await navigator.mediaDevices.getUserMedia(constraints)
                    .catch(() => navigator.mediaDevices.getUserMedia({ video: true, audio: false }));
                video.srcObject = streamObject;
            } catch (err) { alert("カメラ起動失敗: " + err.message); }
        }

        window.setCameraMode = function(mode) {
            currentMode = mode;
            document.getElementById('tab-scan').classList.toggle('active', mode === 'scan');
            document.getElementById('tab-all').classList.toggle('active', mode === 'all');
        }

        // カメラから撮影し、Google Vision APIへ送信
        async function captureAndProcess() {
            const video = document.getElementById('camera-stream');
            const canvas = document.getElementById('capture-canvas');
            const apiKey = document.getElementById('api-key').value.trim();
            let targetNum = document.getElementById('target-number-input').value.trim();

            if (!apiKey) return alert("VISION API PASSを入力してください。");
            if (!video.srcObject) return alert("カメラが起動していません。");

            // スキャンモードの時に手入力が空だったら警告
            if (currentMode === 'scan' && targetNum.length !== 3) {
                return alert("部分スキャンを行う前に、検索したい「3桁の数字」を入力してください。");
            }

            const indicator = document.getElementById('scan-indicator');
            indicator.style.display = 'flex';

            canvas.width = 1280;
            canvas.height = 720;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const base64Image = canvas.toDataURL('image/jpeg', 0.85).replace(/^data:image\/jpeg;base64,/, "");

            try {
                const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        requests: [{
                            image: { content: base64Image },
                            features: [{ type: "TEXT_DETECTION" }]
                        }]
                    })
                });
                const data = await response.json();
                const textAnnotations = data.responses[0]?.textAnnotations || [];
                
                if (textAnnotations.length === 0) {
                    alert("文字を検出できませんでした。");
                    return;
                }

                if (currentMode === 'scan') {
                    // 【部分スキャンモード】：3ステップの幾何学的ロジックで真下のアルファベットを仕留める
                    executeThreeStepScan(textAnnotations, targetNum);
                } else {
                    // 【全体撮影モード】：画面全体から3桁数字とアルファベットを緩く全抽出してマッチング（予備用）
                    executeFlexAllScan(textAnnotations, targetNum);
                }

            } catch (e) {
                alert("通信または解析エラーが発生しました。");
            } finally {
                indicator.style.display = 'none';
            }
        }

        // OCRの誤認識をあらかじめ防ぐパッチ処理
        function cleanDigitString(str) {
            return str.replace(/O/g, '0').replace(/o/g, '0')
                      .replace(/I/g, '1').replace(/l/g, '1')
                      .replace(/Z/g, '2').replace(/S/g, '5')
                      .replace(/B/g, '8');
        }

        function cleanAlphaString(str) {
            // アルファベット用の補正（数字の誤りをもとに戻す）
            return str.toUpperCase()
                      .replace(/0/g, 'O').replace(/1/g, 'I')
                      .replace(/2/g, 'Z').replace(/5/g, 'S')
                      .replace(/8/g, 'B');
        }

        // 3ステップ解析アルゴリズム（メイン機能）
        function executeThreeStepScan(annotations, targetNum) {
            // 全体テキスト（最初の要素）を除外した各文字ブロックを取得
            const blocks = annotations.slice(1).map(anno => {
                const vertices = anno.boundingPoly.vertices;
                // 中心座標の計算
                const cx = (vertices[0].x + vertices[1].x + vertices[2].x + vertices[3].x) / 4;
                const cy = (vertices[0].y + vertices[1].y + vertices[2].y + vertices[3].y) / 4;
                
                // 上辺のベクトルから「文字の傾き角度(ラジアン)」を算出
                const dx = vertices[1].x - vertices[0].x;
                const dy = vertices[1].y - vertices[0].y;
                const angle = Math.atan2(dy, dx); 

                // 高さを算出（距離の基準値にするため）
                const h = Math.sqrt(Math.pow(vertices[3].x - vertices[0].x, 2) + Math.pow(vertices[3].y - vertices[0].y, 2));

                return {
                    text: anno.description,
                    cx: cx, cy: cy,
                    angle: angle,
                    height: h,
                    vertices: vertices
                };
            });

            // ① 指定された3桁の数字を見つける
            const targetDigitBlocks = blocks.filter(b => {
                const cleaned = cleanDigitString(b.text);
                return cleaned.match(/^\d{3}$/) && cleaned === targetNum;
            });

            if (targetDigitBlocks.length === 0) {
                document.getElementById('detected-alphabet-output').innerText = "ERR";
                alert(`ターゲット数字「${targetNum}」が画像内から見つかりません。正面から捉え直してください。`);
                return;
            }

            // 最初に見つかったターゲット数字を基準にする
            const digitBase = targetDigitBlocks[0];
            const theta = digitBase.angle; // 数字の傾き角度
            
            // ② その数字と平行かつ真下に位置するアルファベットを探索
            let bestCandidate = null;
            let minScore = Infinity;

            // 数字ブロックの「真下ベクトル」を定義
            // 本来の真下（画面の下方向）に、文字の傾き theta を加味する
            const downX = -Math.sin(theta);
            const downY = Math.cos(theta);

            blocks.forEach(b => {
                // 自分自身（数字ブロック）は除外
                if (b.cx === digitBase.cx && b.cy === digitBase.cy) return;

                const cleanedAlpha = cleanAlphaString(b.text);
                // 1文字の英大文字のみをターゲットとする
                if (!cleanedAlpha.match(/^[A-Z]$/)) return;

                // 数字からこのアルファベットへの相対ベクトル
                const rx = b.cx - digitBase.cx;
                const ry = b.cy - digitBase.cy;

                // 数字のローカル座標系に変換（平行かつ真下か判定するため）
                // 投影距離（真下方向にどれだけ進んでいるか）
                const projDist = rx * downX + ry * downY;
                // 横ズレ（真下ラインから左右にどれだけ逸れているか）
                const sideDist = rx * Math.cos(theta) + ry * Math.sin(theta);

                // ストッパー緩和条件：
                // 1. 真下（正の方向）にあること
                // 2. 距離が数字の高さの0.5倍〜6倍の範囲内（正方形の枠の位置）
                // 3. 横ズレが、縦の進捗距離に対して「左右35度以内（扇状）」に収まっていること
                if (projDist > digitBase.height * 0.5 && projDist < digitBase.height * 6.0) {
                    if (Math.abs(sideDist) < projDist * Math.tan(35 * Math.PI / 180)) {
                        
                        // 条件に合う場合、最も「真下ラインに近く、適切な距離にある」ものをスコア化
                        const score = Math.abs(sideDist) * 1.5 + projDist; 
                        if (score < minScore) {
                            minScore = score;
                            bestCandidate = cleanedAlpha;
                        }
                    }
                }
            });

            // ③ そのアルファベットを表示する
            if (bestCandidate) {
                document.getElementById('detected-alphabet-output').innerText = bestCandidate;
            } else {
                document.getElementById('detected-alphabet-output').innerText = "ERR";
                alert("数字は見つかりましたが、その真下にあるはずのペアのアルファベット枠を特定できませんでした。もう少し近づけるか、垂直に撮影してください。");
            }
        }

        // 全体撮影モード（全体からざっくり探す予備用ロジック）
        function executeFlexAllScan(annotations, targetNum) {
            const fullText = annotations[0]?.description || "";
            
            // 3桁数字と1文字アルファベットの関係性を、全体の文字並びから最も近いペアとして判定する
            const blocks = annotations.slice(1).map(anno => ({
                text: anno.description,
                vertices: anno.boundingPoly.vertices,
                cx: (anno.boundingPoly.vertices[0].x + anno.boundingPoly.vertices[2].x) / 2,
                cy: (anno.boundingPoly.vertices[0].y + anno.boundingPoly.vertices[2].y) / 2
            }));

            // 指定された数字ブロックを抽出
            const digitBlocks = blocks.filter(b => cleanDigitString(b.text) === targetNum);
            
            if (digitBlocks.length === 0) {
                // 入力された数字自体が全体に見当たらない場合、全体テキストから強引に正規表現で探す
                document.getElementById('detected-alphabet-output').innerText = "ERR";
                alert("全体撮影でもターゲットの数字を補足できませんでした。");
                return;
            }

            const baseDigit = digitBlocks[0];
            let nearestAlpha = null;
            let minDistance = Infinity;

            blocks.forEach(b => {
                const alpha = cleanAlphaString(b.text);
                if (alpha.match(/^[A-Z]$/)) {
                    // 単純な直線距離の近さで判定（全体撮影用）
                    const dist = Math.sqrt(Math.pow(b.cx - baseDigit.cx, 2) + Math.pow(b.cy - baseDigit.cy, 2));
                    if (dist < minDistance) {
                        minDistance = dist;
                        nearestAlpha = alpha;
                    }
                }
            });

            if (nearestAlpha) {
                document.getElementById('detected-alphabet-output').innerText = nearestAlpha;
            } else {
                document.getElementById('detected-alphabet-output').innerText = "ERR";
            }
        }
    </script>
</body>
</html>
