<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>絶望要塞IG スカウターツール（左右完全分離版）</title>
    <!-- Firebase SDK (v10) -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
      }
    </script>
    <style>
        :root {
            --bg-dark: #0a0e14;
            --cyber-blue: #00e5ff;
            --cyber-green: #39ff14;
            --cyber-purple: #b57cff;
            --cyber-red: #ff3333;
            --panel-bg: rgba(16, 23, 33, 0.95);
            --panel-border: rgba(0, 229, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace, "Helvetica Neue", Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: #e0e6ed;
            overflow: hidden;
        }

        input[type="text"], input[type="password"], input[type="tel"] {
            background: rgba(7, 13, 22, 0.9);
            border: 1px solid var(--panel-border);
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
            outline: none;
        }
        input:focus {
            border-color: var(--cyber-blue);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ==========================================================================
           PHASE 1: 設定画面
           ========================================================================== */
        #setup-phase {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 20px;
            text-align: center;
            color: var(--cyber-blue);
            text-shadow: 0 0 10px rgba(0,229,255,0.5);
            padding: 10px 0;
            border-bottom: 2px dashed var(--panel-border);
        }

        .member-status-bar {
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid var(--panel-border);
            padding: 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            background-color: var(--cyber-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cyber-green);
        }

        .config-box {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 15px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .config-box label {
            font-size: 12px;
            color: #8cc8ff;
            display: block;
            margin-bottom: 4px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .btn-start-scan {
            background: linear-gradient(135deg, #0077ff, var(--cyber-blue));
            color: #fff;
            padding: 16px;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(0,229,255,0.4);
        }

        .btn-reset-system {
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid var(--cyber-red);
            color: var(--cyber-red);
            padding: 12px;
            font-size: 13px;
        }

        /* ==========================================================================
           PHASE 2: 横画面HUD（左右完全2分割化）
           ========================================================================== */
        #scan-phase {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            display: none;
            z-index: 1000;
            /* 画面を左右にパキッと分割 */
            grid-template-columns: 1fr 300px; 
        }

        /* 左側：カメラ専用ファインダーエリア（一切重ね物なし） */
        .finder-container {
            grid-column: 1;
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #camera-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 左上のフローティング操作ボタン群 */
        .hud-left-controls {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        .btn-exit-icon, .btn-zoom-toggle {
            height: 38px;
            border-radius: 6px;
            background: rgba(10, 14, 20, 0.8);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .btn-zoom-toggle {
            color: var(--cyber-blue);
            border-color: var(--cyber-blue);
        }
        .btn-zoom-toggle:active, .btn-exit-icon:active {
            background: var(--cyber-blue);
            color: #000;
        }

        /* 右側：完全情報・操作パネルエリア */
        .hud-right {
            grid-column: 2;
            background: #0a0e14;
            border-left: 2px solid rgba(0, 229, 255, 0.3);
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
            height: 100%;
            pointer-events: auto;
            overflow-y: auto;
        }

        .hud-panel-title {
            font-size: 11px;
            color: #8cc8ff;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 4px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* スロット一覧 */
        .hud-slot-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .hud-slot-row {
            display: flex;
            align-items: center;
            background: rgba(20, 30, 45, 0.6);
            border: 1px solid rgba(140, 200, 255, 0.2);
            border-radius: 4px;
            padding: 4px;
            gap: 6px;
            height: 56px;
        }
        .hud-slot-row.has-error { border-color: rgba(255, 51, 51, 0.4); background: rgba(255,0,0,0.05); }
        .hud-slot-row input {
            width: 48px;
            height: 36px;
            padding: 2px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            background: #000;
            border-color: rgba(0,229,255,0.4);
            color: var(--cyber-blue);
        }
        
        .hud-slot-ans-zone {
            flex: 1;
            height: 100%;
            background: rgba(0,0,0,0.5);
            border-radius: 3px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .hud-slot-ans-zone img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .hud-slot-ans-zone .no-img-text {
            font-size: 11px;
            color: #445566;
            font-weight: bold;
        }
        .hud-slot-ans-zone .err-text {
            font-size: 11px;
            color: var(--cyber-red);
            font-weight: bold;
        }

        /* 下部コントロール：2連並列シャッターボタン */
        .hud-control-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-top: 6px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .stocks-counter { font-size: 10px; color: #8cc8ff; font-weight: bold; text-align: center; }

        /* 2つのスキャンボタンを横並びにするコンテナ */
        .shutter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn-shutter-target {
            padding: 12px 0;
            border-radius: 6px;
            background: linear-gradient(180deg, #ffffff 0%, #b5e9ff 100%);
            border: 2px solid var(--cyber-blue);
            color: #050b14;
            font-size: 13px;
            font-weight: 900;
            box-shadow: 0 0 10px rgba(0,229,255,0.2);
        }
        .btn-shutter-target:active { background: var(--cyber-blue); color: #fff; transform: scale(0.95); }

        .btn-shutter-quest {
            padding: 12px 0;
            border-radius: 6px;
            background: linear-gradient(180deg, #ffffff 0%, #e2c6ff 100%);
            border: 2px solid var(--cyber-purple);
            color: #050b14;
            font-size: 13px;
            font-weight: 900;
            box-shadow: 0 0 10px rgba(181,124,255,0.2);
        }
        .btn-shutter-quest:active { background: var(--cyber-purple); color: #fff; transform: scale(0.95); }
        
        .scan-dimmer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 229, 255, 0.2); opacity: 0; pointer-events: none; z-index: 5;
            transition: opacity 0.1s;
        }
        .scan-dimmer.active { opacity: 1; }

        .toast-log {
            position: absolute; left: 20px; bottom: 20px; background: rgba(0,0,0,0.85);
            border-left: 3px solid var(--cyber-blue); padding: 8px 14px; font-size: 11px;
            z-index: 20; pointer-events: none; opacity: 0; transition: all 0.2s;
        }
        .toast-log.show { opacity: 1; }

        .camera-crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; pointer-events: none; opacity: 0.3;
        }
        .camera-crosshair::before, .camera-crosshair::after { content: ''; position: absolute; background: white; }
        .camera-crosshair::before { top: 14px; left: 0; width: 30px; height: 2px; }
        .camera-crosshair::after { left: 14px; top: 0; width: 2px; height: 30px; }
    </style>
</head>
<body>

    <!-- PHASE 1: 設定画面 -->
    <div id="setup-phase">
        <h1>DESPAIR FORTRESS SCOUTER</h1>
        <div class="member-status-bar">
            <span class="online-dot"></span>
            <span id="member-list-text">ONLINE: 待機中...</span>
        </div>
        <div class="config-box">
            <div>
                <label>ROOM ID:</label>
                <input type="text" id="room-id" placeholder="team1">
            </div>
            <div>
                <label>YOUR NAME:</label>
                <input type="text" id="user-name" placeholder="プレイヤー名">
            </div>
            <div>
                <label>GOOGLE VISION API PASS:</label>
                <input type="password" id="api-key" placeholder="AIzaSy...">
            </div>
        </div>
        <div class="action-grid">
            <button class="btn-start-scan" id="btn-enter-scan">📷 スキャン画面を開始する</button>
            <button class="btn-reset-system" id="btn-reset-all">ルーム全体のデータを完全リセット</button>
        </div>
    </div>

    <!-- PHASE 2: 横画面スキャンHUD（左右完全セパレート構成） -->
    <div id="scan-phase">
        <!-- 左半分：100%遮蔽物のない純粋なカメラ画面 -->
        <div class="finder-container">
            <video id="camera-stream" autoplay playsinline muted></video>
            <div class="camera-crosshair"></div>
            <div class="scan-dimmer" id="scan-indicator"></div>

            <!-- 左上設置のコントロール（退室＆レンズ切り替え） -->
            <div class="hud-left-controls">
                <button class="btn-exit-icon" id="btn-exit-scan">🚪 EXIT</button>
                <button class="btn-zoom-toggle" id="btn-toggle-lens">🔄 1.0x / 0.5x</button>
            </div>
        </div>

        <!-- 右半分：情報・入力・スキャン操作に完全特化した固定パネル -->
        <div class="hud-right">
            <div class="hud-panel-title">SCOUTER INTERFACE</div>
            
            <!-- スロット群 -->
            <div class="hud-slot-list">
                <div class="hud-slot-row" id="row-0">
                    <input type="tel" id="box-0" placeholder="01" maxlength="3">
                    <div class="hud-slot-ans-zone" id="zone-0"><span class="no-img-text">VOID</span></div>
                </div>
                <div class="hud-slot-row" id="row-1">
                    <input type="tel" id="box-1" placeholder="02" maxlength="3">
                    <div class="hud-slot-ans-zone" id="zone-1"><span class="no-img-text">VOID</span></div>
                </div>
                <div class="hud-slot-row" id="row-2">
                    <input type="tel" id="box-2" placeholder="03" maxlength="3">
                    <div class="hud-slot-ans-zone" id="zone-2"><span class="no-img-text">VOID</span></div>
                </div>
                <div class="hud-slot-row" id="row-3">
                    <input type="tel" id="box-3" placeholder="04" maxlength="3">
                    <div class="hud-slot-ans-zone" id="zone-3"><span class="no-img-text">VOID</span></div>
                </div>
                <div class="hud-slot-row" id="row-4">
                    <input type="tel" id="box-4" placeholder="05" maxlength="3">
                    <div class="hud-slot-ans-zone" id="zone-4"><span class="no-img-text">VOID</span></div>
                </div>
            </div>

            <!-- 下部：データ数と「2連並列ボタン」 -->
            <div class="hud-control-bottom">
                <div class="stocks-counter" id="db-counter">STOCKS: 0</div>
                <div class="shutter-grid">
                    <button class="btn-shutter-target" id="shutter-target">🎯 TARGET</button>
                    <button class="btn-shutter-quest" id="shutter-quest">📋 QUEST</button>
                </div>
            </div>
        </div>

        <div class="toast-log" id="toast-log">SCANNING...</div>
    </div>

    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, deleteDoc } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let localStream = null;
        let allPhotosMap = {}; 
        let unsubscribeRoom = null;
        let presenceInterval = null;
        let isUltraWideMode = true; // 初回は超広角(0.5倍)をデフォルト狙いにするフラグ

        const setupPhase = document.getElementById('setup-phase');
        const scanPhase = document.getElementById('scan-phase');
        const searchBoxes = [
            document.getElementById('box-0'), document.getElementById('box-1'),
            document.getElementById('box-2'), document.getElementById('box-3'),
            document.getElementById('box-4')
        ];
        const ansZones = [
            document.getElementById('zone-0'), document.getElementById('zone-1'),
            document.getElementById('zone-2'), document.getElementById('zone-3'),
            document.getElementById('zone-4')
        ];

        window.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            initEventListeners();
        });

        function initEventListeners() {
            document.getElementById('btn-enter-scan').addEventListener('click', () => { isUltraWideMode = true; startCameraEngine(); });
            document.getElementById('btn-exit-scan').addEventListener('click', exitScanMode);
            document.getElementById('btn-reset-all').addEventListener('click', resetSystem);
            
            // 手動レンズ切り替えボタンのイベント登録
            document.getElementById('btn-toggle-lens').addEventListener('click', toggleCameraLens);

            // 並列スキャンボタンのダイレクトイベント
            document.getElementById('shutter-target').addEventListener('click', () => processCaptureOCR("target"));
            document.getElementById('shutter-quest').addEventListener('click', () => processCaptureOCR("question"));

            ['room-id', 'user-name', 'api-key'].forEach(id => {
                document.getElementById(id).addEventListener('input', saveConfig);
            });

            searchBoxes.forEach((box) => {
                box.addEventListener('input', () => {
                    syncInputsToFirebase();
                    executeSearch();
                });
            });
        }

        // カメラ起動コアエンジン
        async function startCameraEngine() {
            setupPhase.style.display = 'none';
            scanPhase.style.display = 'grid'; // 横分割用にgrid指定

            if(localStream) { localStream.getTracks().forEach(track => track.stop()); }

            try {
                // 仮起動して権限を開放
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                tempStream.getTracks().forEach(track => track.stop());

                let targetDeviceId = null;
                const backCameras = videoDevices.filter(d => 
                    d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('rear') || 
                    d.label.toLowerCase().includes('背面') || d.label.toLowerCase().includes('カメラ')
                );

                if (backCameras.length > 0) {
                    if (isUltraWideMode) {
                        // 0.5倍(超広角)レンズを探す
                        const ultraWide = backCameras.find(d => 
                            d.label.toLowerCase().includes('ultra') || d.label.toLowerCase().includes('0.5') ||
                            d.label.toLowerCase().includes('super') || d.label.toLowerCase().includes('ウルトラ') ||
                            d.label.toLowerCase().includes('超広角') || d.label.toLowerCase().includes('3')
                        );
                        targetDeviceId = ultraWide ? ultraWide.deviceId : (backCameras[1] ? backCameras[1].deviceId : backCameras[0].deviceId);
                    } else {
                        // 1.0倍(標準)レンズを指定（背面リストの先頭になるケースが大半）
                        const standardLens = backCameras.find(d => d.label.toLowerCase().includes('main') || d.label.toLowerCase().includes('wide') || d.label.toLowerCase().includes('広角')) || backCameras[0];
                        targetDeviceId = standardLens ? standardLens.deviceId : backCameras[0].deviceId;
                    }
                }

                const constraints = {
                    video: {
                        deviceId: targetDeviceId ? { exact: targetDeviceId } : undefined,
                        facingMode: targetDeviceId ? undefined : { ideal: "environment" },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        zoom: isUltraWideMode ? { ideal: 0.5 } : { ideal: 1.0 }
                    },
                    audio: false
                };

                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // ズーム命令の上書き強制（コンボ処理）
                const videoTrack = localStream.getVideoTracks()[0];
                const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
                if (capabilities.zoom) {
                    const targetZoom = isUltraWideMode ? capabilities.zoom.min : 1.0;
                    try { await videoTrack.applyConstraints({ advanced: [{ zoom: targetZoom }] }); } catch(e){}
                }

                document.getElementById('camera-stream').srcObject = localStream;
                if (scanPhase.requestFullscreen) { scanPhase.requestFullscreen().catch(() => {}); }
                
                startFirebaseRoomSync();
                showToast(`LENS: ${isUltraWideMode ? '0.5x ULTRA WIDE' : '1.0x STANDARD'}`);

            } catch (err) {
                console.error(err);
                showToast("CAMERA INITIALIZE FAILED");
            }
        }

        // 📷 ボタンを押すたびにレンズを強制交互切り替えする関数
        function toggleCameraLens() {
            isUltraWideMode = !isUltraWideMode;
            showToast(isUltraWideMode ? "SWITCHING TO 0.5x..." : "SWITCHING TO 1.0x...");
            startCameraEngine();
        }

        function exitScanMode() {
            if(localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
            if (document.exitFullscreen) { document.exitFullscreen().catch(()=>{}); }
            if(unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; }
            clearInterval(presenceInterval);
            scanPhase.style.display = 'none';
            setupPhase.style.display = 'flex';
        }

        function startFirebaseRoomSync() {
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            const user = document.getElementById('user-name').value.trim() || 'Unknown';

            if(presenceInterval) clearInterval(presenceInterval);
            const reportPresence = async () => {
                const rId = document.getElementById('room-id').value.trim() || 'default_room';
                const uName = document.getElementById('user-name').value.trim() || 'Unknown';
                try { await setDoc(doc(db, "rooms", rId), { members: { [uName]: Date.now() } }, { merge: true }); } catch(e){}
            };
            reportPresence();
            presenceInterval = setInterval(reportPresence, 4000);

            unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), (snapshot) => {
                if (!snapshot.exists()) {
                    allPhotosMap = {}; document.getElementById('db-counter').innerText = "STOCKS: 0"; executeSearch(); return;
                }
                const data = snapshot.data();
                if (data.members) {
                    const now = Date.now();
                    const activeMembers = Object.keys(data.members).filter(name => (now - data.members[name]) < 10000);
                    document.getElementById('member-list-text').innerText = `ONLINE: ${activeMembers.join(', ')}`;
                }
                if (data.currentQueries) {
                    data.currentQueries.forEach((q, idx) => {
                        if (document.activeElement !== searchBoxes[idx]) { searchBoxes[idx].value = q || ""; }
                    });
                }
                if (data.photoMap) {
                    allPhotosMap = data.photoMap;
                    document.getElementById('db-counter').innerText = `STOCKS: ${Object.keys(allPhotosMap).length}`;
                } else {
                    allPhotosMap = {}; document.getElementById('db-counter').innerText = "STOCKS: 0";
                }
                executeSearch();
            });
        }

        async function syncInputsToFirebase() {
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            const queries = searchBoxes.map(b => b.value.trim());
            try { await updateDoc(doc(db, "rooms", roomId), { currentQueries: queries }); } catch(e) {}
        }

        // 2つのスキャンボタンから連動するOCRコア
        async function processCaptureOCR(mode) {
            const videoEl = document.getElementById('camera-stream');
            const canvas = document.getElementById('capture-canvas');
            const apiKey = document.getElementById('api-key').value.trim();
            if(!localStream || !apiKey) return;

            const indicator = document.getElementById('scan-indicator');
            indicator.classList.add('active');
            setTimeout(() => indicator.classList.remove('active'), 120);
            showToast(`SCANNING FOR ${mode.toUpperCase()}...`);

            canvas.width = videoEl.videoWidth;
            canvas.height = videoEl.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
            
            const base64Image = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
            const url = `https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`;
            const requestBody = {
                requests: [{
                    image: { content: base64Image },
                    features: [{ type: "TEXT_DETECTION" }]
                }]
            };

            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody) });
                const resData = await response.json();
                if (!resData.responses || !resData.responses[0].textAnnotations) { showToast("TEXT NOT FOUND"); return; }

                const annotations = resData.responses[0].textAnnotations;
                if (mode === "target") {
                    await analyzeTargetModeAlternative(annotations, canvas);
                } else {
                    await analyzeQuestionMode(annotations);
                }
            } catch (err) { showToast("API REQUEST ERROR"); }
        }

        async function analyzeTargetModeAlternative(annotations, srcCanvas) {
            const fullList = annotations.slice(1);
            const updates = {};
            let count = 0;

            fullList.forEach(item => {
                const text = item.description.trim();
                const box = item.boundingPoly.vertices;
                if (!box || box.length < 4) return;

                if (/^\d{3}$/.test(text)) {
                    const xMin = Math.min(box[0]?.x ?? 0, box[1]?.x ?? 0, box[2]?.x ?? 0, box[3]?.x ?? 0);
                    const yMin = Math.min(box[0]?.y ?? 0, box[1]?.y ?? 0, box[2]?.y ?? 0, box[3]?.y ?? 0);
                    const w = Math.max(box[0]?.x ?? 0, box[1]?.x ?? 0, box[2]?.x ?? 0, box[3]?.x ?? 0) - xMin;
                    const h = Math.max(box[0]?.y ?? 0, box[1]?.y ?? 0, box[2]?.y ?? 0, box[3]?.y ?? 0) - yMin;

                    const padX = w * 0.4;
                    const cropX = Math.max(0, xMin - padX);
                    const cropW = w + (padX * 2);

                    const padYTop = h * 0.3;
                    const cropY = Math.max(0, yMin - padYTop);
                    const cropH = h * 4.2;

                    const cropCanvas = document.createElement('canvas');
                    cropCanvas.width = 140; cropCanvas.height = 120;
                    const cCtx = cropCanvas.getContext('2d');

                    cCtx.drawImage(srcCanvas, cropX, cropY, cropW, cropH, 0, 0, 140, 120);

                    updates[text] = {
                        croppedImg: cropCanvas.toDataURL('image/jpeg', 0.7),
                        timestamp: Date.now()
                    };
                    count++;
                }
            });

            if (count > 0) {
                const roomId = document.getElementById('room-id').value.trim() || 'default_room';
                const mergedMap = { ...allPhotosMap };
                Object.keys(updates).forEach(num => { mergedMap[num] = updates[num]; });
                try {
                    await updateDoc(doc(db, "rooms", roomId), { photoMap: mergedMap });
                    showToast(`STOCKED: ${count} NUMBERS`);
                } catch (e) { showToast("SYNC ERROR"); }
            } else { showToast("NO 3-DIGIT TARGETS"); }
        }

        async function analyzeQuestionMode(annotations) {
            const fullList = annotations.slice(1);
            const foundNumbers = [];
            fullList.forEach(item => {
                const text = item.description.trim();
                if (/^\d{3}$/.test(text)) {
                    const box = item.boundingPoly.vertices;
                    const centerX = ((box[0]?.x ?? 0) + (box[2]?.x ?? 0)) / 2;
                    foundNumbers.push({ text, x: centerX });
                }
            });
            foundNumbers.sort((a, b) => a.x - b.x);

            if (foundNumbers.length >= 1) {
                const limit = Math.min(foundNumbers.length, 5);
                for(let i = 0; i < limit; i++) { searchBoxes[i].value = foundNumbers[i].text; }
                showToast(`QUEST AUTOFILL: ${limit} SLOTS`);
                syncInputsToFirebase();
                executeSearch();
            } else { showToast("NO NUMBER FOUND"); }
        }

        function executeSearch() {
            searchBoxes.forEach((box, index) => {
                const query = box.value.trim();
                const zone = ansZones[index];
                const rowDiv = document.getElementById('row-' + index);

                if (!query) {
                    zone.innerHTML = '<span class="no-img-text">VOID</span>';
                    rowDiv.classList.remove('has-error');
                    return;
                }

                const foundMatch = allPhotosMap[query];
                if (foundMatch && foundMatch.croppedImg) {
                    zone.innerHTML = `<img src="${foundMatch.croppedImg}">`;
                    rowDiv.classList.remove('has-error');
                } else {
                    zone.innerHTML = '<span class="err-text">NONE</span>';
                    rowDiv.classList.add('has-error');
                }
            });
        }

        async function resetSystem() {
            if (!confirm("ルーム全体のデータを完全リセットしますか？")) return;
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            try {
                await deleteDoc(doc(db, "rooms", roomId));
                allPhotosMap = {}; searchBoxes.forEach(box => box.value = ""); executeSearch();
                showToast("ROOM DATA RESET SUCCESS");
            } catch(e) {}
        }

        function saveConfig() {
            localStorage.setItem('cyber_ocr_api_key', document.getElementById('api-key').value);
            localStorage.setItem('cyber_room_id', document.getElementById('room-id').value);
            localStorage.setItem('cyber_user_name', document.getElementById('user-name').value);
        }
        function loadConfig() {
            document.getElementById('api-key').value = localStorage.getItem('cyber_ocr_api_key') || "";
            document.getElementById('room-id').value = localStorage.getItem('cyber_room_id') || "team1";
            document.getElementById('user-name').value = localStorage.getItem('cyber_user_name') || "";
        }
        function showToast(msg) {
            const toast = document.getElementById('toast-log');
            toast.innerText = msg; toast.classList.add('show');
            clearTimeout(toast.timeout);
            toast.timeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
