<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>N かくれんぼツール</title>
    <!-- Firebase SDK (v10) -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
      }
    </script>
    <style>
        :root {
            --bg-dark: #0a0e14;
            --cyber-blue: #00e5ff;
            --cyber-green: #39ff14;
            --cyber-purple: #b57cff;
            --cyber-red: #ff3333;
            --panel-bg: rgba(16, 23, 33, 0.85);
            --panel-border: rgba(0, 229, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace, "Helvetica Neue", Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: #e0e6ed;
            overflow: hidden;
        }

        input[type="text"], input[type="password"], input[type="tel"] {
            background: rgba(7, 13, 22, 0.9);
            border: 1px solid var(--panel-border);
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
            outline: none;
        }
        input:focus {
            border-color: var(--cyber-blue);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ==========================================================================
           PHASE 1: 設定画面
           ========================================================================== */
        #setup-phase {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 20px;
            text-align: center;
            color: var(--cyber-blue);
            text-shadow: 0 0 10px rgba(0,229,255,0.5);
            padding: 10px 0;
            border-bottom: 2px dashed var(--panel-border);
        }

        .member-status-bar {
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid var(--panel-border);
            padding: 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            background-color: var(--cyber-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cyber-green);
        }

        .config-box {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 15px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .config-box label {
            font-size: 12px;
            color: #8cc8ff;
            display: block;
            margin-bottom: 4px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .btn-start-scan {
            background: linear-gradient(135deg, #0077ff, var(--cyber-blue));
            color: #fff;
            padding: 16px;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(0,229,255,0.4);
        }

        .btn-reset-system {
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid var(--cyber-red);
            color: var(--cyber-red);
            padding: 12px;
            font-size: 13px;
        }

        /* ==========================================================================
           PHASE 2: 横画面HUD
           ========================================================================== */
        #scan-phase {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; display: none; z-index: 1000;
        }

        #camera-stream {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            display: grid;
            grid-template-columns: 1fr 280px;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            pointer-events: none;
        }

        .hud-left-floating, .hud-left-bottom-floating, .hud-right { pointer-events: auto; }

        /* 左上：退室ボタン */
        .hud-left-floating { position: absolute; top: 15px; left: 15px; z-index: 10; }
        .btn-exit-icon {
            width: 38px; height: 38px; border-radius: 6px;
            background: rgba(10, 14, 20, 0.6); border: 1px solid rgba(255,255,255,0.3);
            color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center;
        }

        /* 【新設】左下：スロットクリアボタン（ゴミ箱アイコン） */
        .hud-left-bottom-floating { position: absolute; bottom: 15px; left: 15px; z-index: 10; }
        .btn-clear-icon {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255, 51, 51, 0.2); border: 1px solid var(--cyber-red);
            color: var(--cyber-red); font-size: 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
            backdrop-filter: blur(4px);
        }
        .btn-clear-icon:active { transform: scale(0.9); background: rgba(255, 51, 51, 0.5); color: #fff; }

        .hud-right {
            grid-column: 2;
            background: rgba(10, 14, 20, 0.75);
            backdrop-filter: blur(4px);
            border-left: 1px solid rgba(0, 229, 255, 0.2);
            display: flex; flex-direction: column; padding: 6px; gap: 6px; height: 100%;
        }

        .hud-mode-container { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .hud-tab {
            font-size: 10px; padding: 6px 2px; text-align: center;
            border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.5); color: #778899; border-radius: 3px;
        }
        .hud-tab.active.mode-target { border-color: var(--cyber-blue); color: var(--cyber-blue); background: rgba(0, 229, 255, 0.1); }
        .hud-tab.active.mode-question { border-color: var(--cyber-purple); color: var(--cyber-purple); background: rgba(181, 124, 255, 0.1); }

        .hud-slot-list { display: flex; flex-direction: column; gap: 4px; }
        .hud-slot-row {
            display: flex; align-items: center;
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(140, 200, 255, 0.2);
            border-radius: 4px; padding: 3px; gap: 4px; height: 52px;
        }
        .hud-slot-row.has-error { border-color: rgba(255, 51, 51, 0.3); }
        .hud-slot-row input {
            width: 44px; height: 32px; padding: 2px; font-size: 14px; text-align: center;
            background: rgba(20,30,45,0.9); border-color: rgba(0,229,255,0.3);
        }
        
        .hud-slot-ans-zone {
            flex: 1;
            height: 100%;
            background: rgba(0,0,0,0.4);
            border-radius: 2px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }
        .hud-slot-ans-zone img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .hud-slot-ans-zone .no-img-text {
            font-size: 10px;
            color: #445566;
            font-weight: bold;
        }
        .hud-slot-ans-zone .err-text {
            font-size: 11px;
            color: var(--cyber-red);
            font-weight: bold;
        }

        .hud-control-bottom {
            margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.08);
        }
        .stocks-counter { font-size: 9px; color: #8cc8ff; font-weight: bold; }

        .btn-shutter {
            width: 100%; padding: 10px 0; border-radius: 6px;
            background: linear-gradient(180deg, #ffffff 0%, #b5e9ff 100%);
            border: 2px solid var(--cyber-blue); box-shadow: 0 0 10px rgba(0,229,255,0.3);
            color: #050b14; font-size: 14px; font-weight: 900; letter-spacing: 2px;
        }
        .btn-shutter:active { transform: scale(0.96); background: var(--cyber-blue); color: #fff; }
        
        .scan-dimmer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 229, 255, 0.15); opacity: 0; pointer-events: none; z-index: 5;
            transition: opacity 0.1s;
        }
        .scan-dimmer.active { opacity: 1; }

        .toast-log {
            position: absolute; left: 20px; bottom: 70px; /* クリアボタンを避けるため少し上に調整 */
            background: rgba(0,0,0,0.85);
            border-left: 3px solid var(--cyber-blue); padding: 8px 14px; font-size: 11px;
            z-index: 10; pointer-events: none; opacity: 0; transition: all 0.2s;
        }
        .toast-log.show { opacity: 1; }

        .camera-crosshair {
            position: absolute; top: 50%; left: 38%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; pointer-events: none; opacity: 0.25;
        }
        .camera-crosshair::before, .camera-crosshair::after { content: ''; position: absolute; background: white; }
        .camera-crosshair::before { top: 14px; left: 0; width: 30px; height: 2px; }
        .camera-crosshair::after { left: 14px; top: 0; width: 2px; height: 30px; }
    </style>
</head>
<body>

    <!-- PHASE 1: 設定画面 -->
    <div id="setup-phase">
        <h1>DESPAIR FORTRESS SCOUTER</h1>
        <div class="member-status-bar">
            <span class="online-dot"></span>
            <span id="member-list-text">ONLINE: 待機中...</span>
        </div>
        <div class="config-box">
            <div>
                <label>ROOM ID:</label>
                <input type="text" id="room-id" placeholder="team1">
            </div>
            <div>
                <label>YOUR NAME:</label>
                <input type="text" id="user-name" placeholder="プレイヤー名">
            </div>
            <div>
                <label>GOOGLE VISION API PASS:</label>
                <input type="password" id="api-key" placeholder="AIzaSy...">
            </div>
        </div>
        <div class="action-grid">
            <button class="btn-start-scan" id="btn-enter-scan">スキャン開始</button>
            <button class="btn-reset-system" id="btn-reset-all">ROOMリセット</button>
        </div>
    </div>

    <!-- PHASE 2: 横画面スキャンHUD -->
    <div id="scan-phase">
        <video id="camera-stream" autoplay playsinline muted></video>
        <div class="camera-crosshair"></div>
        <div class="scan-dimmer" id="scan-indicator"></div>

        <!-- 左上浮動ボタン -->
        <div class="hud-left-floating">
            <button class="btn-exit-icon" id="btn-exit-scan">🚪</button>
        </div>

        <!-- 【新設】左下浮動ボタン（スロットの数字リセット用ゴミ箱ボタン） -->
        <div class="hud-left-bottom-floating">
            <button class="btn-clear-icon" id="btn-clear-slots" title="スロットクリア">🗑️</button>
        </div>

        <div class="hud-overlay">
            <div></div> <!-- 左側透過ファインダー -->

            <!-- 右側：肉眼確認型集中パネル -->
            <div class="hud-right">
                <div class="hud-mode-container">
                    <div class="hud-tab active mode-target" id="tab-target">🎯 TARGET</div>
                    <div class="hud-tab" id="tab-question">📋 QUEST</div>
                </div>
                
                <!-- スロット群 -->
                <div class="hud-slot-list">
                    <div class="hud-slot-row" id="row-0">
                        <input type="tel" id="box-0" placeholder="01" maxlength="3">
                        <div class="hud-slot-ans-zone" id="zone-0"><span class="no-img-text">VOID</span></div>
                    </div>
                    <div class="hud-slot-row" id="row-1">
                        <input type="tel" id="box-1" placeholder="02" maxlength="3">
                        <div class="hud-slot-ans-zone" id="zone-1"><span class="no-img-text">VOID</span></div>
                    </div>
                    <div class="hud-slot-row" id="row-2">
                        <input type="tel" id="box-2" placeholder="03" maxlength="3">
                        <div class="hud-slot-ans-zone" id="zone-2"><span class="no-img-text">VOID</span></div>
                    </div>
                    <div class="hud-slot-row" id="row-3">
                        <input type="tel" id="box-3" placeholder="04" maxlength="3">
                        <div class="hud-slot-ans-zone" id="zone-3"><span class="no-img-text">VOID</span></div>
                    </div>
                    <div class="hud-slot-row" id="row-4">
                        <input type="tel" id="box-4" placeholder="05" maxlength="3">
                        <div class="hud-slot-ans-zone" id="zone-4"><span class="no-img-text">VOID</span></div>
                    </div>
                </div>

                <div class="hud-control-bottom">
                    <div class="stocks-counter" id="db-counter">STOCKS: 0</div>
                    <button class="btn-shutter" id="shutter-trigger">SCAN</button>
                </div>
            </div>
        </div>

        <div class="toast-log" id="toast-log">SCANNING...</div>
    </div>

    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, deleteDoc, arrayUnion } from "firebase/firestore";

        // Firebase構成オブジェクト（各自で書き換えてください）
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentMode = "target"; 
        let localStream = null;
        let allPhotosData = [];
        let unsubscribeRoom = null;
        let presenceInterval = null;

        const setupPhase = document.getElementById('setup-phase');
        const scanPhase = document.getElementById('scan-phase');
        const searchBoxes = [
            document.getElementById('box-0'), document.getElementById('box-1'),
            document.getElementById('box-2'), document.getElementById('box-3'),
            document.getElementById('box-4')
        ];
        const ansZones = [
            document.getElementById('zone-0'), document.getElementById('zone-1'),
            document.getElementById('zone-2'), document.getElementById('zone-3'),
            document.getElementById('zone-4')
        ];

        window.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            initEventListeners();
        });

        function initEventListeners() {
            document.getElementById('btn-enter-scan').addEventListener('click', enterScanMode);
            document.getElementById('btn-exit-scan').addEventListener('click', exitScanMode);
            document.getElementById('btn-reset-all').addEventListener('click', resetSystem);
            document.getElementById('tab-target').addEventListener('click', () => switchScanMode('target'));
            document.getElementById('tab-question').addEventListener('click', () => switchScanMode('question'));
            document.getElementById('shutter-trigger').addEventListener('click', processCaptureOCR);
            
            // 【新設】クリアボタンのクリックイベント
            document.getElementById('btn-clear-slots').addEventListener('click', clearAllSlots);

            ['room-id', 'user-name', 'api-key'].forEach(id => {
                document.getElementById(id).addEventListener('input', saveConfig);
            });

            searchBoxes.forEach((box) => {
                box.addEventListener('input', () => {
                    syncInputsToFirebase();
                    executeSearch();
                });
            });
        }

        async function enterScanMode() {
            const apiKey = document.getElementById('api-key').value.trim();
            if(!apiKey) { alert("Vision API PASSを入力してください"); return; }
            setupPhase.style.display = 'none';
            scanPhase.style.display = 'block';

            // 【倍率変更の最適化】
            // idealではなく、端末で利用できる最も広角なカメラ（超広角等）を強制指定しやすくするため
            // videoのfacingModeまわりの指定構造を強化し、ズーム倍率を最小(1)にする詳細指示を追加。
            const constraints = {
                video: { 
                    facingMode: { ideal: "environment" }, 
                    width: { ideal: 1920 }, 
                    height: { ideal: 1080 },
                    advanced: [
                        { zoom: 1 }, // デジタルズームによる拡大を無効化（等倍）
                        { focusMode: "continuous" } // ピンボケ防止
                    ]
                },
                audio: false
            };
            try {
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('camera-stream').srcObject = localStream;
                if (scanPhase.requestFullscreen) { scanPhase.requestFullscreen().catch(() => {}); }
                startFirebaseRoomSync();
            } catch (err) {
                alert("カメラの起動に失敗しました。");
                exitScanMode();
            }
        }

        function exitScanMode() {
            if(localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
            if (document.exitFullscreen) { document.exitFullscreen().catch(()=>{}); }
            if(unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; }
            clearInterval(presenceInterval);
            scanPhase.style.display = 'none';
            setupPhase.style.display = 'flex';
        }

        // 【新設】すべてのスロットとHUDの表示をリセットする関数
        function clearAllSlots() {
            searchBoxes.forEach(box => box.value = "");
            showToast("SLOTS CLEARED");
            syncInputsToFirebase();
            executeSearch();
        }

        function switchScanMode(mode) {
            currentMode = mode;
            document.getElementById('tab-target').className = "hud-tab" + (mode === 'target' ? ' active mode-target' : '');
            document.getElementById('tab-question').className = "hud-tab" + (mode === 'question' ? ' active mode-question' : '');
            showToast(`MODE: ${mode.toUpperCase()}`);
        }

        function startFirebaseRoomSync() {
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            const user = document.getElementById('user-name').value.trim() || 'Unknown';

            if(presenceInterval) clearInterval(presenceInterval);
            const reportPresence = async () => {
                const rId = document.getElementById('room-id').value.trim() || 'default_room';
                const uName = document.getElementById('user-name').value.trim() || 'Unknown';
                try {
                    await setDoc(doc(db, "rooms", rId), { members: { [uName]: Date.now() } }, { merge: true });
                } catch(e){}
            };
            reportPresence();
            presenceInterval = setInterval(reportPresence, 4000);

            unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), (snapshot) => {
                if (!snapshot.exists()) {
                    allPhotosData = [];
                    document.getElementById('db-counter').innerText = "STOCKS: 0";
                    executeSearch();
                    return;
                }
                const data = snapshot.data();
                if (data.members) {
                    const now = Date.now();
                    const activeMembers = Object.keys(data.members).filter(name => (now - data.members[name]) < 10000);
                    document.getElementById('member-list-text').innerText = `ONLINE: ${activeMembers.join(', ')}`;
                }
                if (data.currentQueries) {
                    data.currentQueries.forEach((q, idx) => {
                        if (document.activeElement !== searchBoxes[idx]) { searchBoxes[idx].value = q || ""; }
                    });
                }
                if (data.photos) {
                    allPhotosData = data.photos;
                    document.getElementById('db-counter').innerText = `STOCKS: ${allPhotosData.length}`;
                } else {
                    allPhotosData = [];
                    document.getElementById('db-counter').innerText = "STOCKS: 0";
                }
                executeSearch();
            });
        }

        async function syncInputsToFirebase() {
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            const queries = searchBoxes.map(b => b.value.trim());
            try { await updateDoc(doc(db, "rooms", roomId), { currentQueries: queries }); } catch(e) {}
        }

        async function processCaptureOCR() {
            const videoEl = document.getElementById('camera-stream');
            const canvas = document.getElementById('capture-canvas');
            const apiKey = document.getElementById('api-key').value.trim();
            if(!localStream || !apiKey) return;

            const indicator = document.getElementById('scan-indicator');
            indicator.classList.add('active');
            setTimeout(() => indicator.classList.remove('active'), 120);
            showToast("PROCESSING SCAN...");

            canvas.width = videoEl.videoWidth;
            canvas.height = videoEl.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
            
            const base64Image = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
            const url = `https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`;
            const requestBody = {
                requests: [{
                    image: { content: base64Image },
                    features: [{ type: "TEXT_DETECTION" }]
                }]
            };

            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody) });
                const resData = await response.json();
                if (!resData.responses || !resData.responses[0].textAnnotations) { showToast("TEXT NOT FOUND"); return; }

                const annotations = resData.responses[0].textAnnotations;
                if (currentMode === "target") {
                    await analyzeTargetModeAlternative(annotations, canvas);
                } else {
                    await analyzeQuestionMode(annotations);
                }
            } catch (err) { showToast("API REQUEST ERROR"); }
        }

        async function analyzeTargetModeAlternative(annotations, srcCanvas) {
            const fullList = annotations.slice(1);
            const blocks = [];

            fullList.forEach(item => {
                const text = item.description.trim();
                const box = item.boundingPoly.vertices;
                if (!box || box.length < 4) return;

                if (/^\d{3}$/.test(text)) {
                    const xMin = Math.min(box[0].x, box[1].x, box[2].x, box[3].x);
                    const yMin = Math.min(box[0]?.y ?? 0, box[1]?.y ?? 0, box[2]?.y ?? 0, box[3]?.y ?? 0);
                    const w = Math.max(box[0].x, box[1].x, box[2].x, box[3].x) - xMin;
                    const h = Math.max(box[0]?.y ?? 0, box[1]?.y ?? 0, box[2]?.y ?? 0, box[3]?.y ?? 0) - yMin;

                    const padX = w * 0.4;
                    const cropX = Math.max(0, xMin - padX);
                    const cropW = w + (padX * 2);

                    const padYTop = h * 0.3; 
                    const cropY = Math.max(0, yMin - padYTop);
                    const cropH = h * 4.2;   

                    const cropCanvas = document.createElement('canvas');
                    cropCanvas.width = 140;
                    cropCanvas.height = 120;
                    const cCtx = cropCanvas.getContext('2d');

                    cCtx.drawImage(
                        srcCanvas,
                        cropX, cropY, cropW, cropH, 
                        0, 0, 140, 120             
                    );

                    blocks.push({
                        number: text,
                        croppedImg: cropCanvas.toDataURL('image/jpeg', 0.7) 
                    });
                }
            });

            if (blocks.length > 0) {
                const roomId = document.getElementById('room-id').value.trim() || 'default_room';
                for (const block of blocks) {
                    await updateDoc(doc(db, "rooms", roomId), {
                        photos: arrayUnion({
                            timestamp: Date.now(),
                            blocks: [block]
                        })
                    });
                }
                showToast(`STOCKED: ${blocks.length} NUMBERS`);
            } else {
                document.getElementById('toast-log').innerText = "NO 3-DIGIT TARGETS";
            }
        }

        async function analyzeQuestionMode(annotations) {
            const fullList = annotations.slice(1);
            const foundNumbers = [];
            fullList.forEach(item => {
                const text = item.description.trim();
                if (/^\d{3}$/.test(text)) {
                    const box = item.boundingPoly.vertices;
                    foundNumbers.push({ text, x: (box[0].x + box[2].x) / 2 });
                }
            });
            foundNumbers.sort((a, b) => a.x - b.x);

            if (foundNumbers.length >= 1) {
                const limit = Math.min(foundNumbers.length, 5);
                for(let i = 0; i < limit; i++) { searchBoxes[i].value = foundNumbers[i].text; }
                showToast(`QUEST AUTOFILL: ${limit} SLOTS`);
                syncInputsToFirebase();
                executeSearch();
            } else {
                showToast("NO NUMBER FOUND");
            }
        }

        function executeSearch() {
            searchBoxes.forEach((box, index) => {
                const query = box.value.trim();
                const zone = ansZones[index];
                const rowDiv = document.getElementById('row-' + index);

                if (!query) {
                    zone.innerHTML = '<span class="no-img-text">VOID</span>';
                    rowDiv.classList.remove('has-error');
                    return;
                }

                let foundMatch = null;
                for (let i = allPhotosData.length - 1; i >= 0; i--) {
                    const photo = allPhotosData[i];
                    const match = photo.blocks.find(b => b.number === query);
                    if (match) { foundMatch = match; break; }
                }

                if (foundMatch && foundMatch.croppedImg) {
                    zone.innerHTML = `<img src="${foundMatch.croppedImg}">`;
                    rowDiv.classList.remove('has-error');
                } else {
                    zone.innerHTML = '<span class="err-text">NONE</span>';
                    rowDiv.classList.add('has-error');
                }
            });
        }

        async function resetSystem() {
            if (!confirm("ルーム全体のデータを完全リセットしますか？")) return;
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            try {
                await deleteDoc(doc(db, "rooms", roomId));
                allPhotosData = [];
                searchBoxes.forEach(box => box.value = "");
                executeSearch();
                showToast("ROOM DATA RESET SUCCESS");
            } catch(e) {}
        }

        function saveConfig() {
            localStorage.setItem('cyber_ocr_api_key', document.getElementById('api-key').value);
            localStorage.setItem('cyber_room_id', document.getElementById('room-id').value);
            localStorage.setItem('cyber_user_name', document.getElementById('user-name').value);
        }
        function loadConfig() {
            document.getElementById('api-key').value = localStorage.getItem('cyber_ocr_api_key') || "";
            document.getElementById('room-id').value = localStorage.getItem('cyber_room_id') || "team1";
            document.getElementById('user-name').value = localStorage.getItem('cyber_user_name') || "";
        }
        function showToast(msg) {
            const toast = document.getElementById('toast-log');
            toast.innerText = msg; toast.classList.add('show');
            clearTimeout(toast.timeout);
            toast.timeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
