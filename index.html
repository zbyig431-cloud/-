<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>絶望要塞IG 横画面対応スカウターツール</title>
    <!-- Firebase SDK (v10) -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
      }
    </script>
    <style>
        :root {
            --bg-dark: #0a0e14;
            --cyber-blue: #00e5ff;
            --cyber-green: #39ff14;
            --cyber-purple: #b57cff;
            --cyber-red: #ff3333;
            --panel-bg: rgba(16, 23, 33, 0.85);
            --panel-border: rgba(0, 229, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace, "Helvetica Neue", Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: #e0e6ed;
            overflow: hidden;
        }

        /* 共通ボタン & 入力スタイル */
        input[type="text"], input[type="password"], input[type="tel"] {
            background: rgba(7, 13, 22, 0.9);
            border: 1px solid var(--panel-border);
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: border 0.3s;
        }
        input:focus {
            border-color: var(--cyber-blue);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ==========================================================================
           PHASE 1: 設定・コントロール画面（デフォルト縦画面想定）
           ========================================================================== */
        #setup-phase {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 20px;
            text-align: center;
            color: var(--cyber-blue);
            text-shadow: 0 0 10px rgba(0,229,255,0.5);
            padding: 10px 0;
            border-bottom: 2px dashed var(--panel-border);
        }

        .member-status-bar {
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid var(--panel-border);
            padding: 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            background-color: var(--cyber-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cyber-green);
            animation: pulse 1.5s infinite;
        }

        .config-box {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 15px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .config-box label {
            font-size: 12px;
            color: #8cc8ff;
            display: block;
            margin-bottom: 4px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .btn-start-scan {
            background: linear-gradient(135deg, #0077ff, var(--cyber-blue));
            color: #fff;
            padding: 16px;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(0,229,255,0.4);
        }
        .btn-start-scan:active { transform: scale(0.98); }

        .btn-reset-system {
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid var(--cyber-red);
            color: var(--cyber-red);
            padding: 12px;
            font-size: 13px;
        }
        .btn-reset-system:hover { background: var(--cyber-red); color: #fff; }

        /* ==========================================================================
           PHASE 2: フルスクリーン横画面スキャン画面
           ========================================================================== */
        #scan-phase {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: none; /* 初期は非表示 */
            z-index: 1000;
        }

        /* 横型全画面カメラ映像 */
        #camera-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 画面全体の透過型HUDレイアウト */
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: grid;
            grid-template-columns: 160px 1fr 240px; /* 左操作系 / 中央透過スペース / 右答え表示 */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            pointer-events: none;
        }

        /* 全てのUI部品をインタラクティブに戻す */
        .hud-left, .hud-right, .hud-center-bottom {
            pointer-events: auto;
        }

        /* 左側操作パネル */
        .hud-left {
            background: rgba(10, 14, 20, 0.75);
            backdrop-filter: blur(4px);
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
        }

        .btn-back {
            background: rgba(255,255,255,0.1);
            border: 1px solid #aaa;
            color: #fff;
            padding: 6px;
            font-size: 11px;
            width: 100%;
        }

        .mode-selectors {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
        }
        .hud-tab {
            font-size: 11px;
            padding: 10px 6px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4);
            color: #888;
        }
        .hud-tab.active.mode-target {
            border-color: var(--cyber-blue);
            color: var(--cyber-blue);
            box-shadow: inset 0 0 8px rgba(0,229,255,0.2);
        }
        .hud-tab.active.mode-question {
            border-color: var(--cyber-purple);
            color: var(--cyber-purple);
            box-shadow: inset 0 0 8px rgba(181,124,255,0.2);
        }

        .stocks-counter {
            font-size: 10px;
            color: #8cc8ff;
            text-align: center;
            margin-top: 5px;
        }

        /* 中央下部：シャッターエリア */
        .hud-center-bottom {
            grid-column: 2;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
        }
        .btn-shutter {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 40%, rgba(255,255,255,0.4) 70%);
            border: 4px solid var(--cyber-blue);
            box-shadow: 0 0 20px rgba(0,229,255,0.6);
            color: #000;
            font-size: 14px;
            font-weight: 900;
        }
        .btn-shutter:active { transform: scale(0.92); }
        
        /* スキャン中インジケーター */
        .scan-dimmer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 229, 255, 0.15);
            opacity: 0; pointer-events: none; z-index: 5;
            transition: opacity 0.1s;
        }
        .scan-dimmer.active { opacity: 1; }

        /* 右側：超コンパクト半透過答え表示パネル（スキャンの邪魔をしない） */
        .hud-right {
            background: rgba(10, 14, 20, 0.65);
            backdrop-filter: blur(2px);
            border-left: 1px solid rgba(0, 229, 255, 0.15);
            display: flex;
            flex-direction: column;
            padding: 8px;
            overflow-y: auto;
            gap: 6px;
        }

        .hud-right-title {
            font-size: 10px;
            color: #6688aa;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 4px;
        }

        .hud-slot-row {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(140, 200, 255, 0.15);
            border-radius: 4px;
            padding: 4px;
            gap: 6px;
            height: 52px;
        }
        .hud-slot-row.has-error {
            border-color: rgba(255,51,51,0.4);
            background: rgba(255,51,51,0.05);
        }
        .hud-slot-row input {
            width: 50px;
            height: 32px;
            padding: 2px;
            font-size: 13px;
            text-align: center;
            background: rgba(20,30,45,0.8);
        }
        .hud-slot-ans {
            flex: 1;
            font-size: 16px;
            font-weight: bold;
            color: var(--cyber-green);
            text-align: center;
            text-shadow: 0 0 6px var(--cyber-green);
        }
        .hud-slot-ans.err { color: var(--cyber-red); text-shadow: none; font-size: 12px;}
        
        .hud-slot-thumb {
            width: 60px;
            height: 42px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hud-slot-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .hud-slot-thumb span {
            font-size: 8px;
            color: #445566;
        }

        /* トースト通知 */
        .toast-log {
            position: absolute;
            left: 175px;
            bottom: 20px;
            background: rgba(0,0,0,0.8);
            border-left: 3px solid var(--cyber-blue);
            padding: 8px 12px;
            font-size: 11px;
            border-radius: 2px;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: transform 0.2s, opacity 0.2s;
            transform: translateY(10px);
        }
        .toast-log.show { opacity: 1; transform: translateY(0); }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* ガイド表示用のオーバーレイ境界線 */
        .camera-crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            pointer-events: none;
            opacity: 0.3;
        }
        .camera-crosshair::before, .camera-crosshair::after {
            content: ''; position: absolute; background: white;
        }
        .camera-crosshair::before { top: 19px; left: 0; width: 40px; height: 2px; }
        .camera-crosshair::after { left: 19px; top: 0; width: 2px; height: 40px; }
    </style>
</head>
<body>

    <!-- ==========================================
         PHASE 1: 設定画面 (縦画面メイン)
         ========================================== -->
    <div id="setup-phase">
        <h1>DESPAIR FORTRESS SCOUTER</h1>
        
        <div class="member-status-bar">
            <span class="online-dot"></span>
            <span id="member-list-text">ONLINE: 待機中...</span>
        </div>

        <div class="config-box">
            <div>
                <label>ROOM ID (即時共有の部屋コード):</label>
                <input type="text" id="room-id" placeholder="team1">
            </div>
            <div>
                <label>YOUR NAME:</label>
                <input type="text" id="user-name" placeholder="プレイヤー名">
            </div>
            <div>
                <label>GOOGLE VISION API PASS (API KEY):</label>
                <input type="password" id="api-key" placeholder="AIzaSy...">
            </div>
        </div>

        <div class="action-grid">
            <button class="btn-start-scan" id="btn-enter-scan">📷 スキャン画面を開始する</button>
            <button class="btn-reset-system" id="btn-reset-all">ルーム全体のデータを完全リセット</button>
        </div>
    </div>

    <!-- ==========================================
         PHASE 2: 横画面専用 スキャンHUD画面
         ========================================== -->
    <div id="scan-phase">
        <!-- フルスクリーンカメラストリーム -->
        <video id="camera-stream" autoplay playsinline muted></video>
        
        <!-- 中央エイムライン -->
        <div class="camera-crosshair"></div>
        
        <!-- スキャン時の画面フラッシュ用 -->
        <div class="scan-dimmer" id="scan-indicator"></div>

        <!-- 透過HUDレイアウト -->
        <div class="hud-overlay">
            
            <!-- 左操作サイドバー -->
            <div class="hud-left">
                <div>
                    <button class="btn-back" id="btn-exit-scan">◀ 設定に戻る</button>
                    <div class="mode-selectors">
                        <div class="hud-tab active mode-target" id="tab-target">🎯 TARGET</div>
                        <div class="hud-tab mode-purple" id="tab-question">📋 QUESTION</div>
                    </div>
                </div>
                <div>
                    <div class="stocks-counter" id="db-counter">STOCKS: 0</div>
                </div>
            </div>

            <!-- 中央シャッター空間 -->
            <div class="hud-center-bottom">
                <button class="btn-shutter" id="shutter-trigger">SCAN</button>
            </div>

            <!-- 右透過型リアルタイム結果ディスプレイ -->
            <div class="hud-right">
                <div class="hud-right-title">SYNCED SLOTS</div>
                
                <!-- スロット 01～05 -->
                <div class="hud-slot-row" id="row-0">
                    <input type="tel" class="search-box" id="box-0" placeholder="01" maxlength="3">
                    <span class="hud-slot-ans" id="res-0">---</span>
                    <div class="hud-slot-thumb" id="thumb-0"><span>VOID</span></div>
                </div>
                <div class="hud-slot-row" id="row-1">
                    <input type="tel" class="search-box" id="box-1" placeholder="02" maxlength="3">
                    <span class="hud-slot-ans" id="res-1">---</span>
                    <div class="hud-slot-thumb" id="thumb-1"><span>VOID</span></div>
                </div>
                <div class="hud-slot-row" id="row-2">
                    <input type="tel" class="search-box" id="box-2" placeholder="03" maxlength="3">
                    <span class="hud-slot-ans" id="res-2">---</span>
                    <div class="hud-slot-thumb" id="thumb-2"><span>VOID</span></div>
                </div>
                <div class="hud-slot-row" id="row-3">
                    <input type="tel" class="search-box" id="box-3" placeholder="04" maxlength="3">
                    <span class="hud-slot-ans" id="res-3">---</span>
                    <div class="hud-slot-thumb" id="thumb-3"><span>VOID</span></div>
                </div>
                <div class="hud-slot-row" id="row-4">
                    <input type="tel" class="search-box" id="box-4" placeholder="05" maxlength="3">
                    <span class="hud-slot-ans" id="res-4">---</span>
                    <div class="hud-slot-thumb" id="thumb-4"><span>VOID</span></div>
                </div>
            </div>
        </div>

        <!-- アラートトースト -->
        <div class="toast-log" id="toast-log">SCANNING...</div>
    </div>

    <!-- 内部処理用隠しキャンバス -->
    <canvas id="capture-canvas" style="display:none;"></canvas>

    <!-- ==========================================
         JAVASCRIPT LOGIC
         ========================================== -->
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, deleteDoc, arrayUnion } from "firebase/firestore";

        // --- 各自のFirebase設定オブジェクトをここに貼り付けてください ---
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // システムグローバル変数
        let currentMode = "target"; // "target" もしくは "question"
        let localStream = null;
        let allPhotosData = [];
        let unsubscribeRoom = null;
        let presenceInterval = null;

        // DOMの取得
        const setupPhase = document.getElementById('setup-phase');
        const scanPhase = document.getElementById('scan-phase');
        const searchBoxes = [
            document.getElementById('box-0'), document.getElementById('box-1'),
            document.getElementById('box-2'), document.getElementById('box-3'),
            document.getElementById('box-4')
        ];

        window.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            initEventListeners();
        });

        function initEventListeners() {
            // モード及びフェーズ遷移
            document.getElementById('btn-enter-scan').addEventListener('click', enterScanMode);
            document.getElementById('btn-exit-scan').addEventListener('click', exitScanMode);
            document.getElementById('btn-reset-all').addEventListener('click', resetSystem);

            document.getElementById('tab-target').addEventListener('click', () => switchScanMode('target'));
            document.getElementById('tab-question').addEventListener('click', () => switchScanMode('question'));
            
            // シャッターボタン
            document.getElementById('shutter-trigger').addEventListener('click', processCaptureOCR);

            // ローカルストレージ自動保存
            ['room-id', 'user-name', 'api-key'].forEach(id => {
                document.getElementById(id).addEventListener('input', saveConfig);
            });

            // 検索スロットの変更イベント（入力されたら即時Firebase同期＆再検索）
            searchBoxes.forEach((box, idx) => {
                box.addEventListener('input', () => {
                    syncInputsToFirebase();
                    executeSearch();
                });
            });
        }

        // --- フェーズ切り替え & カメラ制御 ---
        async function enterScanMode() {
            const apiKey = document.getElementById('api-key').value.trim();
            if(!apiKey) { alert("Vision API PASSを入力してください"); return; }

            setupPhase.style.display = 'none';
            scanPhase.style.display = 'block';

            // フルスクリーン全画面・広角高解像度要求
            const constraints = {
                video: {
                    facingMode: { ideal: "environment" },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false
            };

            try {
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                const videoEl = document.getElementById('camera-stream');
                videoEl.srcObject = localStream;
                
                // フルスクリーン要求（iOS/Androidのブラウザ仕様による）
                if (scanPhase.requestFullscreen) {
                    scanPhase.requestFullscreen().catch(() => {});
                } else if (scanPhase.webkitRequestFullscreen) {
                    scanPhase.webkitRequestFullscreen().catch(() => {});
                }

                // リアルタイムリスナー開始
                startFirebaseRoomSync();
            } catch (err) {
                alert("カメラの起動に失敗しました。カメラ権限を確認してください。");
                exitScanMode();
            }
        }

        function exitScanMode() {
            if(localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (document.exitFullscreen) { document.exitFullscreen().catch(()=>{}); }
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen().catch(()=>{}); }

            if(unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; }
            clearInterval(presenceInterval);

            scanPhase.style.display = 'none';
            setupPhase.style.display = 'flex';
        }

        function switchScanMode(mode) {
            currentMode = mode;
            const tabTarget = document.getElementById('tab-target');
            const tabQuest = document.getElementById('tab-question');
            
            tabTarget.className = "hud-tab" + (mode === 'target' ? ' active mode-target' : '');
            tabQuest.className = "hud-tab" + (mode === 'question' ? ' active mode-question' : '');
            
            showToast(`MODE: ${mode.toUpperCase()}`);
        }

        // --- Firebase同期コアロジック ---
        function startFirebaseRoomSync() {
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            const user = document.getElementById('user-name').value.trim() || 'Unknown';

            // 生存信号 (Presence) 処理
            if(presenceInterval) clearInterval(presenceInterval);
            const reportPresence = async () => {
                const rId = document.getElementById('room-id').value.trim() || 'default_room';
                const uName = document.getElementById('user-name').value.trim() || 'Unknown';
                try {
                    await setDoc(doc(db, "rooms", rId), {
                        members: { [uName]: Date.now() }
                    }, { merge: true });
                } catch(e){}
            };
            reportPresence();
            presenceInterval = setInterval(reportPresence, 4000);

            // リスナー監視開始
            unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), (snapshot) => {
                if (!snapshot.exists()) {
                    allPhotosData = [];
                    document.getElementById('db-counter').innerText = "STOCKS: 0";
                    executeSearch();
                    return;
                }
                const data = snapshot.data();

                // メンバーリスト更新
                if (data.members) {
                    const now = Date.now();
                    const activeMembers = Object.keys(data.members).filter(name => (now - data.members[name]) < 10000);
                    document.getElementById('member-list-text').innerText = `ONLINE: ${activeMembers.join(', ')}`;
                }

                // 検索ボックステキストの同期（他メンバーの変更を入力欄へ反映）
                if (data.currentQueries) {
                    data.currentQueries.forEach((q, idx) => {
                        if (document.activeElement !== searchBoxes[idx]) {
                            searchBoxes[idx].value = q || "";
                        }
                    });
                }

                // スキャン写真ストックデータの同期
                if (data.photos) {
                    allPhotosData = data.photos;
                    document.getElementById('db-counter').innerText = `STOCKS: ${allPhotosData.length}`;
                } else {
                    allPhotosData = [];
                    document.getElementById('db-counter').innerText = "STOCKS: 0";
                }

                executeSearch();
            });
        }

        async function syncInputsToFirebase() {
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            const queries = searchBoxes.map(b => b.value.trim());
            try {
                await updateDoc(doc(db, "rooms", roomId), { currentQueries: queries });
            } catch(e) {}
        }

        // --- OCR・画像処理エンジン ---
        async function processCaptureOCR() {
            const videoEl = document.getElementById('camera-stream');
            const canvas = document.getElementById('capture-canvas');
            const apiKey = document.getElementById('api-key').value.trim();
            
            if(!localStream || !apiKey) return;

            // フラッシュアニメーション発火
            const indicator = document.getElementById('scan-indicator');
            indicator.classList.add('active');
            setTimeout(() => indicator.classList.remove('active'), 120);
            showToast("PROCESSING SCAN...");

            // 現在の映像フレームをキャプチャ
            canvas.width = videoEl.videoWidth;
            canvas.height = videoEl.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
            
            const base64Image = canvas.toDataURL('image/jpeg', 0.85);
            const base64Clean = base64Image.split(',')[1];

            // Google Cloud Vision API リクエスト
            const url = `https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`;
            const requestBody = {
                requests: [{
                    image: { content: base64Clean },
                    features: [{ type: "TEXT_DETECTION" }]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });
                const resData = await response.json();
                
                if (!resData.responses || !resData.responses[0].textAnnotations) {
                    showToast("TEXT NOT FOUND");
                    return;
                }

                const annotations = resData.responses[0].textAnnotations;
                
                if (currentMode === "target") {
                    await analyzeTargetMode(annotations, canvas);
                } else {
                    await analyzeQuestionMode(annotations);
                }
            } catch (err) {
                showToast("API REQUEST ERROR");
            }
        }

        // 🎯 ターゲットモード: 「3桁数字」とその直下の「アルファベット1文字」のペア関係を抽出
        async function analyzeTargetMode(annotations, srcCanvas) {
            const fullList = annotations.slice(1);
            const numbers = [];
            const alphabets = [];

            fullList.forEach(item => {
                const text = item.description.trim();
                const box = item.boundingPoly.vertices;
                if (!box || box.length < 4) return;
                
                const centerX = (box[0].x + box[2].x) / 2;
                const centerY = (box[0].y + box[2].y) / 2;
                const height = Math.abs(box[2].y - box[0].y);

                if (/^\d{3}$/.test(text)) {
                    numbers.push({ text, x: centerX, y: centerY, h: height, box });
                } else if (/^[a-zA-Z]$/.test(text)) {
                    alphabets.push({ text: text.toUpperCase(), x: centerX, y: centerY });
                }
            });

            const blocks = [];
            numbers.forEach(num => {
                // 数字の直下（X軸が近く、Y軸が少し下）にあるアルファベットを探す
                let bestMatch = null;
                let minDistance = 999999;

                alphabets.forEach(alpha => {
                    const dx = alpha.x - num.x;
                    const dy = alpha.y - num.y;
                    
                    if (Math.abs(dx) < num.h * 1.5 && dy > 0 && dy < num.h * 2.5) {
                        if (dy < minDistance) {
                            minDistance = dy;
                            bestMatch = alpha;
                        }
                    }
                });

                if (bestMatch) {
                    // 周辺領域をクロップしてエビデンス画像を生成
                    const cropCanvas = document.createElement('canvas');
                    cropCanvas.width = 120;
                    cropCanvas.height = 84;
                    const cCtx = cropCanvas.getContext('2d');

                    const v = num.box;
                    const xMin = Math.min(v[0].x, v[1].x, v[2].x, v[3].x);
                    const yMin = Math.min(v[0].y, v[1].y, v[2].y, v[3].y);
                    const w = Math.max(v[0].x, v[1].x, v[2].x, v[3].x) - xMin;
                    
                    const padX = w * 0.4;
                    const padY = num.h * 0.4;

                    cCtx.drawImage(
                        srcCanvas,
                        xMin - padX, yMin - padY, w + (padX * 2), (num.h * 3.2),
                        0, 0, 120, 84
                    );

                    blocks.push({
                        number: num.text,
                        alphabet: bestMatch.text,
                        croppedImg: cropCanvas.toDataURL('image/jpeg', 0.6)
                    });
                }
            });

            if (blocks.length > 0) {
                const roomId = document.getElementById('room-id').value.trim() || 'default_room';
                for (const block of blocks) {
                    await updateDoc(doc(db, "rooms", roomId), {
                        photos: arrayUnion({
                            timestamp: Date.now(),
                            blocks: [block]
                        })
                    });
                }
                showToast(`DETECTED: ${blocks.length} TARGETS`);
            } else {
                showToast("NO VALID PAIR FOUND");
            }
        }

        // 📋 問題スキャンモード: 5つの連続した3桁数字を一括抽出してスロットに流し込む
        async function analyzeQuestionMode(annotations) {
            const fullList = annotations.slice(1);
            const foundNumbers = [];

            fullList.forEach(item => {
                const text = item.description.trim();
                if (/^\d{3}$/.test(text)) {
                    const box = item.boundingPoly.vertices;
                    const centerX = (box[0].x + box[2].x) / 2;
                    foundNumbers.push({ text, x: centerX });
                }
            });

            // 左から並んでいる順にソート(横読み配置に対応)
            foundNumbers.sort((a, b) => a.x - b.x);

            if (foundNumbers.length >= 1) {
                const limit = Math.min(foundNumbers.length, 5);
                for(let i = 0; i < limit; i++) {
                    searchBoxes[i].value = foundNumbers[i].text;
                }
                showToast(`QUESTION AUTOFILL: ${limit} SLOTS`);
                syncInputsToFirebase();
                executeSearch();
            } else {
                showToast("NO 3-DIGIT NUMBER FOUND");
            }
        }

        // --- 検索エンジン & HUDビューへの反映 ---
        function executeSearch() {
            searchBoxes.forEach((box, index) => {
                const query = box.value.trim();
                const resSpan = document.getElementById(`res-${index}`);
                const thumbDiv = document.getElementById(`thumb-${index}`);
                const rowDiv = document.getElementById(`row-${index}`);

                if (!query) {
                    resSpan.innerText = "---";
                    resSpan.className = "hud-slot-ans";
                    thumbDiv.innerHTML = "<span>VOID</span>";
                    rowDiv.classList.remove('has-error');
                    return;
                }

                let foundMatch = null;
                // 最新のスキャンストックから逆引き検索
                for (let i = allPhotosData.length - 1; i >= 0; i--) {
                    const photo = allPhotosData[i];
                    const match = photo.blocks.find(b => b.number === query);
                    if (match) { foundMatch = match; break; }
                }

                if (foundMatch) {
                    resSpan.innerText = foundMatch.alphabet.toUpperCase();
                    resSpan.className = "hud-slot-ans";
                    rowDiv.classList.remove('has-error');
                    if (foundMatch.croppedImg) {
                        thumbDiv.innerHTML = `<img src="${foundMatch.croppedImg}">`;
                    } else {
                        thumbDiv.innerHTML = `<span>ERR</span>`;
                    }
                } else {
                    resSpan.innerText = "ERR";
                    resSpan.className = "hud-slot-ans err";
                    thumbDiv.innerHTML = `<span>NONE</span>`;
                    rowDiv.classList.add('has-error');
                }
            });
        }

        // --- システムリセット ---
        async function resetSystem() {
            if (!confirm("【警告】このルームの全データ（スキャン写真履歴、入力スロット）を完全削除しますか？同じ部屋の全ユーザーに影響します。")) return;
            const roomId = document.getElementById('room-id').value.trim() || 'default_room';
            try {
                await deleteDoc(doc(db, "rooms", roomId));
                allPhotosData = [];
                searchBoxes.forEach(box => box.value = "");
                executeSearch();
                showToast("ROOM DATA RESET SUCCESS");
            } catch(e) { alert("リセットエラーが発生しました"); }
        }

        // --- 設定のLocal保存 & 復元 ---
        function saveConfig() {
            localStorage.setItem('cyber_ocr_api_key', document.getElementById('api-key').value);
            localStorage.setItem('cyber_room_id', document.getElementById('room-id').value);
            localStorage.setItem('cyber_user_name', document.getElementById('user-name').value);
        }
        function loadConfig() {
            document.getElementById('api-key').value = localStorage.getItem('cyber_ocr_api_key') || "";
            document.getElementById('room-id').value = localStorage.getItem('cyber_room_id') || "team1";
            document.getElementById('user-name').value = localStorage.getItem('cyber_user_name') || "";
        }

        // HUD用簡易通知トースト
        function showToast(msg) {
            const toast = document.getElementById('toast-log');
            toast.innerText = msg;
            toast.classList.add('show');
            clearTimeout(toast.timeout);
            toast.timeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
