<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>絶望要塞IG かくれんぼツール</title>
    <style>
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace, sans-serif; }
        body { 
            background-color: #060d13; 
            color: #cceeff; 
            margin: 0; 
            padding: 15px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        h1 {
            font-size: 1.4rem;
            text-align: center;
            margin: 0 0 15px 0;
            color: #8cc8ff;
            text-shadow: 0 0 8px rgba(140, 200, 255, 0.6);
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(140, 200, 255, 0.3);
            padding-bottom: 5px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #00ff66;
            margin-bottom: 10px;
            text-shadow: 0 0 5px rgba(0, 255, 100, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .camera-container {
            width: 100%;
            background: #000;
            border: 2px solid #8cc8ff;
            box-shadow: 0 0 15px rgba(140, 200, 255, 0.2);
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
            aspect-ratio: 4 / 3;
        }

        #camera-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .shutter-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-shutter {
            flex: 1;
            background: linear-gradient(135deg, #0055aa, #002255);
            color: #cceeff;
            border: 2px solid #8cc8ff;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(140, 200, 255, 0.4);
            text-shadow: 0 0 5px #cceeff;
            transition: all 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-shutter:active {
            background: #00ff66;
            color: #000;
            border-color: #ffffff;
            box-shadow: 0 0 15px #00ff66;
            transform: scale(0.98);
        }

        .log-carousel {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            margin-bottom: 15px;
            border-bottom: 1px dashed rgba(140, 200, 255, 0.2);
        }
        .log-item {
            flex: 0 0 70px;
            height: 70px;
            border: 1px solid rgba(140, 200, 255, 0.4);
            position: relative;
            background: #0b1520;
            border-radius: 2px;
        }
        .log-item img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .log-item .status-badge {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.7);
            font-size: 0.5rem;
            text-align: center;
            color: #00ff66;
            padding: 1px 0;
        }
        .log-item.processing .status-badge { color: #ffcc00; }
        .log-item.error .status-badge { color: #ff3333; }

        .config-box {
            background: rgba(140, 200, 255, 0.05);
            border: 1px solid rgba(140, 200, 255, 0.2);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .config-box input {
            width: 100%;
            background: #0b1520;
            border: 1px solid #8cc8ff;
            color: #00ff66;
            padding: 8px;
            font-size: 0.8rem;
            border-radius: 2px;
        }

        .search-inputs-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        .search-row-item {
            display: flex;
            align-items: center;
            background: rgba(6, 19, 31, 0.6);
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid rgba(140, 200, 255, 0.2);
            gap: 15px;
        }
        .search-row-item label {
            font-size: 0.75rem;
            color: #8cc8ff;
            font-weight: bold;
            min-width: 55px;
        }
        .search-row-item input {
            background: #02070c;
            border: 1px solid rgba(140, 200, 255, 0.5);
            color: #00ff64;
            padding: 6px;
            font-size: 1.1rem;
            width: 100px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 4px rgba(0,255,100,0.5);
        }
        .search-row-item input:focus {
            outline: none;
            border-color: #00ff64;
        }
        
        .slot-result-text {
            font-weight: bold;
            color: #ff007f;
            font-size: 1.2rem;
            text-shadow: 0 0 8px #ff007f;
            margin-left: auto;
            min-width: 30px;
            text-align: right;
        }

        .action-panel {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .btn-purple {
            border: 1px solid #b57cff;
            color: #b57cff;
            background: rgba(181, 124, 255, 0.1);
            text-shadow: 0 0 4px #b57cff;
            padding: 12px;
            font-weight: bold;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
        }
        .btn-purple:active {
            background: #b57cff;
            color: #060d13;
            box-shadow: 0 0 15px #b57cff;
        }
        .btn-success {
            border: 2px solid #00ff64;
            color: #00ff64;
            background: rgba(0, 255, 100, 0.1);
            text-shadow: 0 0 4px #00ff64;
            padding: 12px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            flex: 1.5;
        }
        .btn-success:active {
            background: #00ff64;
            color: #060d13;
            box-shadow: 0 0 15px #00ff64;
        }

        .summary-gallery {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: 100%;
            margin-bottom: 15px;
        }
        .summary-card { 
            background: rgba(4, 12, 20, 0.8); 
            border: 1px solid rgba(140, 200, 255, 0.25); 
            border-radius: 4px; 
            padding: 6px; 
            display: flex; 
            flex-direction: column; 
            gap: 5px;
            text-align: center;
        }
        .summary-header { 
            font-size: 16px; 
            font-weight: bold; 
            color: #00ff64; 
            text-shadow: 0 0 6px rgba(0,255,100,0.6);
            line-height: 1.1;
        }
        .summary-canvas-wrapper { 
            background: #000; 
            border: 1px solid rgba(140, 200, 255, 0.3); 
            border-radius: 3px; 
            overflow: hidden; 
        }
        .summary-canvas-wrapper canvas { 
            width: 100%; 
            height: auto; 
            display: block; 
            max-height: 85px; 
            object-fit: contain; 
        }

        .btn-reset {
            width: 100%;
            background: linear-gradient(135deg, #881111, #440000);
            color: #ff8888;
            border: 1px solid #ff3333;
            padding: 10px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .btn-reset:active { background: #ff3333; color: #fff; }

        .loading-dimmer {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 20, 40, 0.4);
            z-index: 10;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            color: #00ff66;
            text-shadow: 0 0 5px #00ff66;
        }
        .loading-dimmer::after {
            content: "SCANNING...";
            animation: blink 0.6s infinite alternate;
        }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }

        #target-loading {
            display: none; color: #b57cff; font-weight: bold; font-size: 11px; text-align: center;
            padding: 8px; background: rgba(181, 124, 255, 0.1); border: 1px solid #b57cff; border-radius: 4px;
            margin-bottom: 10px; animation: blink 1.5s infinite;
        }
    </style>
</head>
<body>

    <h1>絶望要塞IG かくれんぼツール</h1>

    <div class="config-box">
        <div style="font-size:0.75rem; margin-bottom:5px; color:#8cc8ff;">PASS:</div>
        <input type="password" id="api-key" placeholder="AIzaSy..." onchange="saveApiKey()">
    </div>

    <div class="section-title">
        <span>【01】検索したいエリアを撮影(連射可能)</span>
        <span id="db-counter" style="color:#8cc8ff;">STOCKS: 0</span>
    </div>
    
    <div class="camera-container">
        <video id="camera-stream" autoplay playsinline muted></video>
        <div class="loading-dimmer" id="scan-indicator"></div>
    </div>

    <div class="shutter-panel">
        <button class="btn-shutter" id="shutter-trigger">スキャン</button>
    </div>

    <div class="log-carousel" id="log-carousel"></div>

    <div class="section-title">
        <span>【02】検索したい数字を入力(写真可)</span>
        <span id="detected-tag-status" style="color:#b57cff; font-size:0.75rem;"></span>
    </div>

    <div id="target-loading">SCANNING QUESTION PATTERN...</div>

    <div class="search-inputs-list">
        <div class="search-row-item">
            <label>SLOT 01</label>
            <input type="tel" class="search-box" id="box-0" placeholder="---">
            <span class="slot-result-text" id="res-0"></span>
        </div>
        <div class="search-row-item">
            <label>SLOT 02</label>
            <input type="tel" class="search-box" id="box-1" placeholder="---">
            <span class="slot-result-text" id="res-1"></span>
        </div>
        <div class="search-row-item">
            <label>SLOT 03</label>
            <input type="tel" class="search-box" id="box-2" placeholder="---">
            <span class="slot-result-text" id="res-2"></span>
        </div>
        <div class="search-row-item">
            <label>SLOT 04</label>
            <input type="tel" class="search-box" id="box-3" placeholder="---">
            <span class="slot-result-text" id="res-3"></span>
        </div>
        <div class="search-row-item">
            <label>SLOT 05</label>
            <input type="tel" class="search-box" id="box-4" placeholder="---">
            <span class="slot-result-text" id="res-4"></span>
        </div>
    </div>

    <input type="file" id="question-camera-input" accept="image/*" style="display: none;">

    <div class="action-panel">
        <button class="btn-purple" onclick="document.getElementById('question-camera-input').click()">問題を撮影</button>
        <button class="btn-success" id="btn-search">検索する</button>
    </div>

    <div class="section-title">【03】答えを表示</div>
    <div id="summary-gallery-area" class="summary-gallery"></div>

    <button class="btn-reset" id="btn-reset-all">全てリセット</button>

    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script>
        let allPhotosData = []; 
        let streamObject = null;
        const searchBoxes = [
            document.getElementById('box-0'),
            document.getElementById('box-1'),
            document.getElementById('box-2'),
            document.getElementById('box-3'),
            document.getElementById('box-4')
        ];

        window.addEventListener('DOMContentLoaded', () => {
            loadApiKey();
            initCameraStream();
            initSummaryAreaPlaceholder();
            
            document.getElementById('shutter-trigger').addEventListener('click', captureAndScan);
            document.getElementById('btn-search').addEventListener('click', executeSearch);
            document.getElementById('btn-reset-all').addEventListener('click', resetSystem);
            document.getElementById('question-camera-input').addEventListener('change', scanQuestionImage);
        });

        async function initCameraStream() {
            const video = document.getElementById('camera-stream');
            try {
                if (streamObject) {
                    streamObject.getTracks().forEach(track => track.stop());
                }
                const constraints = {
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                };
                streamObject = await navigator.mediaDevices.getUserMedia(constraints)
                    .catch(() => navigator.mediaDevices.getUserMedia({ video: true, audio: false }));
                video.srcObject = streamObject;
            } catch (err) {
                alert("カメラ起動エラー: " + err.message);
            }
        }

        async function captureAndScan() {
            const video = document.getElementById('camera-stream');
            const canvas = document.getElementById('capture-canvas');
            const carousel = document.getElementById('log-carousel');
            const apiKey = document.getElementById('api-key').value.trim();

            if (!apiKey) return alert("先にPASSを入力してください。");
            if (!video.srcObject) return alert("カメラストリームが不完全です。");

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const base64Image = canvas.toDataURL('image/jpeg', 0.95);
            const logId = "log-" + Date.now() + "-" + Math.random().toString(36).substr(2, 5);
            
            const logItem = document.createElement('div');
            logItem.className = 'log-item processing';
            logItem.id = logId;
            logItem.innerHTML = `<img src="${base64Image}"><div class="status-badge">RUNNING</div>`;
            carousel.insertBefore(logItem, carousel.firstChild);

            const indicator = document.getElementById('scan-indicator');
            indicator.style.display = 'flex'; setTimeout(() => { indicator.style.display = 'none'; }, 150);

            sendToVisionAPI(base64Image, logId);
        }

        async function sendToVisionAPI(base64Data, logId) {
            const apiKey = document.getElementById('api-key').value.trim();
            const logItem = document.getElementById(logId);
            const pureBase64 = base64Data.replace(/^data:image\/jpeg;base64,/, "");

            try {
                const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requests: [{ image: { content: pureBase64 }, features: [{ type: "TEXT_DETECTION" }] }] })
                });

                const data = await response.json();
                const annotations = data.responses[0]?.textAnnotations;
                if (!annotations || annotations.length === 0) throw new Error();

                const parsedData = parseOcrAnnotations(annotations);
                allPhotosData.push({ id: logId, base64: base64Data, blocks: parsedData });

                logItem.className = 'log-item';
                logItem.querySelector('.status-badge').innerText = 'SUCCESS';
                logItem.querySelector('.status-badge').style.color = '#00ff66';
                document.getElementById('db-counter').innerText = `STOCKS: ${allPhotosData.length}`;
            } catch (err) {
                if (logItem) {
                    logItem.className = 'log-item error';
                    logItem.querySelector('.status-badge').innerText = 'ERR';
                    logItem.querySelector('.status-badge').style.color = '#ff3333';
                }
            }
        }

        // 改良された解析ロジック
        function parseOcrAnnotations(annotations) {
            const rawBlocks = annotations.slice(1);
            let charObjects = rawBlocks.map(b => {
                const vertices = b.boundingPoly.vertices;
                const xs = vertices.map(v => v.x ?? 0), ys = vertices.map(v => v.y ?? 0);
                const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
                return {
                    text: b.description,
                    centerX: minX + (maxX - minX) / 2, centerY: minY + (maxY - minY) / 2,
                    width: maxX - minX, height: maxY - minY, minX, maxX, minY, maxY
                };
            });

            let numberBlocks = charObjects.filter(b => /^\d+$/.test(b.text));
            let alphaBlocks = charObjects.filter(b => /^[A-Z]$/i.test(b.text));
            let parsedBlocks = [];

            numberBlocks.forEach(numBlk => {
                let bestMatchAlpha = null;
                let minDistance = Infinity;

                // 1つのパネル（数字高さをHとする）に対して、アルファベットが存在すべき妥当な最大縦距離を設定
                // 下すぎる位置にある別のパネル（Fなど）を巻き込まないための制限
                const maxAllowedYDiff = numBlk.height * 4.0; 

                alphaBlocks.forEach(alphaBlk => {
                    const xDiff = Math.abs(numBlk.centerX - alphaBlk.centerX);
                    const yDiff = alphaBlk.centerY - numBlk.centerY;

                    // 数字より下にあり、かつ横方向のズレが数字の幅の1.2倍以内、かつ縦距離が近距離であること
                    if (yDiff > 0 && yDiff < maxAllowedYDiff && xDiff < (numBlk.width * 1.2)) {
                        const distance = Math.sqrt(xDiff * xDiff + yDiff * yDiff);
                        if (distance < minDistance) { 
                            minDistance = distance; 
                            bestMatchAlpha = alphaBlk; 
                        }
                    }
                });

                if (bestMatchAlpha) {
                    // 【修正ポイント】切り抜き範囲を「数字と正解アルファベット」の幅ピッタリに極限までタイトにする
                    // 余白の追加を最小限（左右+4px、上下+4px）にし、下のパネルが絶対に侵入しないように縮小
                    parsedBlocks.push({
                        number: numBlk.text, 
                        alphabet: bestMatchAlpha.text,
                        cropArea: {
                            minX: Math.max(0, Math.min(numBlk.minX, bestMatchAlpha.minX) - 4),
                            minY: Math.max(0, numBlk.minY - 6),
                            maxX: Math.max(numBlk.maxX, bestMatchAlpha.maxX) + 4,
                            maxY: bestMatchAlpha.maxY + 8
                        }
                    });
                }
            });
            return parsedBlocks;
        }

        async function scanQuestionImage(e) {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;

            const apiKey = document.getElementById('api-key').value.trim();
            if (!apiKey) return alert("先にPASSを入力してください。");

            const loading = document.getElementById('target-loading');
            loading.style.display = 'block';

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Image = event.target.result.split(',')[1];
                
                fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requests: [{ image: { content: base64Image }, features: [{ type: 'DOCUMENT_TEXT_DETECTION' }] }] })
                })
                .then(res => res.json())
                .then(data => {
                    loading.style.display = 'none';
                    clearSlotResults();

                    if (data.responses?.[0]?.textAnnotations) {
                        const annotations = data.responses[0].textAnnotations.slice(1);
                        let mapped = annotations
                            .filter(a => /^\d+$/.test(a.description.trim()))
                            .map(a => ({ text: a.description.trim(), x: a.boundingPoly.vertices[0].x ?? 0 }));
                        mapped.sort((a,b) => a.x - b.x);
                        
                        let finalNumbers = [...new Set(mapped.map(m => m.text))];

                        if (finalNumbers.length > 0) {
                            searchBoxes.forEach(box => box.value = "");
                            finalNumbers.slice(0, 5).forEach((num, idx) => {
                                searchBoxes[idx].value = num;
                            });
                            document.getElementById('detected-tag-status').innerText = `AUTO DETECTED: ${finalNumbers.length} NUMS`;
                        } else {
                            document.getElementById('detected-tag-status').innerText = "NOT FOUND";
                        }
                    }
                    document.getElementById('question-camera-input').value = '';
                })
                .catch(err => {
                    loading.style.display = 'none';
                    document.getElementById('question-camera-input').value = '';
                    alert("お題スキャンエラーが発生しました。");
                });
            };
            reader.readAsDataURL(file);
        }

        function executeSearch() {
            const summaryArea = document.getElementById('summary-gallery-area');
            summaryArea.innerHTML = ''; 
            clearSlotResults();

            let matchedCount = 0;

            searchBoxes.forEach((box, index) => {
                const query = box.value.trim();
                const resSpan = document.getElementById(`res-${index}`);

                if (!query) {
                    createEmptySummaryCard(summaryArea, "---");
                    return;
                }

                let foundMatch = null;
                let sourcePhotoBase64 = null;

                // 最新のストックから優先して探す
                for (let i = allPhotosData.length - 1; i >= 0; i--) {
                    const photo = allPhotosData[i];
                    const match = photo.blocks.find(b => b.number === query);
                    if (match) { foundMatch = match; sourcePhotoBase64 = photo.base64; break; }
                }

                if (foundMatch && sourcePhotoBase64) {
                    matchedCount++;
                    const alphaStr = foundMatch.alphabet.toUpperCase();
                    resSpan.innerText = alphaStr; 

                    const card = document.createElement('div');
                    card.className = 'summary-card';

                    const header = document.createElement('div');
                    header.className = 'summary-header';
                    header.innerText = query; 
                    card.appendChild(header);

                    const canvasWrapper = document.createElement('div');
                    canvasWrapper.className = 'summary-canvas-wrapper';
                    
                    const canvas = document.createElement('canvas');
                    const area = foundMatch.cropArea;
                    const w = area.maxX - area.minX;
                    const h = area.maxY - area.minY;
                    canvas.width = w; canvas.height = h;

                    const img = new Image();
                    img.src = sourcePhotoBase64;
                    img.onload = function() {
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, area.minX, area.minY, w, h, 0, 0, w, h);
                    };

                    canvasWrapper.appendChild(canvas);
                    card.appendChild(canvasWrapper);
                    summaryArea.appendChild(card);
                } else {
                    resSpan.innerText = "ERR";
                    createEmptySummaryCard(summaryArea, query, true);
                }
            });

            if (matchedCount === 0 && Array.from(searchBoxes).every(b => !b.value.trim())) {
                initSummaryAreaPlaceholder();
            }
        }

        function createEmptySummaryCard(container, labelText, isError = false) {
            const card = document.createElement('div');
            card.className = 'summary-card';
            card.style.borderColor = isError ? '#ff3333' : 'rgba(140, 200, 255, 0.15)';
            
            const header = document.createElement('div');
            header.className = 'summary-header';
            header.style.color = isError ? '#ff3333' : 'rgba(140,200,255,0.4)';
            header.innerText = labelText;
            
            const wrapper = document.createElement('div');
            wrapper.className = 'summary-canvas-wrapper';
            wrapper.style.height = '45px';
            wrapper.style.display = 'flex';
            wrapper.style.alignItems = 'center';
            wrapper.style.justifyContent = 'center';
            wrapper.innerHTML = `<span style="font-size:10px; color:${isError ? '#ff3333':'rgba(140,200,255,0.2)'};">${isError ? 'ERR':'VOID'}</span>`;
            
            card.appendChild(header);
            card.appendChild(wrapper);
            container.appendChild(card);
        }

        function initSummaryAreaPlaceholder() {
            const summaryArea = document.getElementById('summary-gallery-area');
            summaryArea.innerHTML = '<div style="font-size: 11px; color: #6688aa; padding: 10px; grid-column: span 5; text-align: center;">検索を実行すると、ここに結果が横並びで表示されます</div>';
        }

        function clearSlotResults() {
            for(let i=0; i<5; i++) { document.getElementById(`res-${i}`).innerText = ""; }
        }

        function resetSystem() {
            if (!confirm("データベースおよび全入力スロットを完全リセットしますか？")) return;
            allPhotosData = [];
            document.getElementById('log-carousel').innerHTML = "";
            document.getElementById('db-counter').innerText = "STOCKS: 0";
            document.getElementById('detected-tag-status').innerText = "";
            searchBoxes.forEach(box => box.value = "");
            clearSlotResults();
            initSummaryAreaPlaceholder();
            initCameraStream();
        }

        function saveApiKey() { localStorage.setItem('cyber_ocr_api_key', document.getElementById('api-key').value); }
        function loadApiKey() {
            const savedKey = localStorage.getItem('cyber_ocr_api_key');
            if (savedKey) document.getElementById('api-key').value = savedKey;
        }
    </script>
</body>
</html>
