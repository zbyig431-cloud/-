<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DESPAIR FORTRESS SCOUTER</title>
    
    <!-- Google Fonts & Tailwind CSS for modern Scouter UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK (v10) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --scouter-cyan: #00f0ff;
            --scouter-bg: #030712;
            --scouter-panel: rgba(17, 24, 39, 0.8);
            --scouter-green: #00ff66;
            --scouter-red: #ff3b30;
        }

        body {
            font-family: 'Share Tech Mono', 'Orbitron', monospace;
            background-color: var(--scouter-bg);
            color: var(--scouter-cyan);
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* SF風スキャンラインアニメーション */
        .scanline {
            width: 100%;
            height: 100px;
            background: linear-gradient(
                to bottom,
                rgba(0, 240, 255, 0),
                rgba(0, 240, 255, 0.08) 50%,
                rgba(0, 240, 255, 0)
            );
            position: absolute;
            animation: scan 6s linear infinite;
            pointer-events: none;
            z-index: 50;
        }

        @keyframes scan {
            0% { top: -100px; }
            100% { top: 100%; }
        }

        .neon-border {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            border: 1px solid var(--scouter-cyan);
        }

        .neon-text {
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }

        /* スキャン画面左下のオンライン表示デザイン */
        .scannerview-status {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--scouter-cyan);
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 11px;
            color: var(--scouter-cyan);
            font-family: 'Share Tech Mono', monospace;
            min-width: 110px;
            height: 44px;
            box-sizing: border-box;
            text-transform: uppercase;
        }

        /* 緑のちかちかインジケーター */
        .status-indicator {
            width: 8px;
            height: 8px;
            background-color: var(--scouter-green);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--scouter-green);
            animation: blink 2s infinite;
            flex-shrink: 0;
        }

        @keyframes blink {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* コントロール周りのボタンスタイル */
        .control-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--scouter-cyan);
            color: var(--scouter-cyan);
            border-radius: 4px;
            height: 44px;
            min-width: 65px;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .control-btn:active {
            background: var(--scouter-cyan);
            color: #000;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 8px;
        }

        /* スロット画像の枠線効果 */
        .slot-img-container {
            border: 1px solid rgba(0, 240, 255, 0.3);
            transition: all 0.3s;
        }

        .slot-img-container.active {
            border-color: var(--scouter-green);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 relative">
    <div class="scanline"></div>

    <!-- ================= HOME SCREEN ================= -->
    <div id="home-screen" class="flex-grow flex flex-col justify-between py-6 z-10">
        <header class="text-center">
            <h1 class="text-2xl font-bold tracking-widest neon-text mb-1">DESPAIR FORTRESS SCOUTER</h1>
            <div class="w-full h-0.5 bg-gradient-to-r from-transparent via-[#00f0ff] to-transparent my-4"></div>
        </header>

        <!-- 設定パネル -->
        <main class="flex-grow flex flex-col justify-center max-w-md mx-auto w-full px-4">
            <div class="bg-[rgba(17,24,39,0.8)] p-6 rounded-lg neon-border space-y-5">
                <!-- ルームID設定 -->
                <div>
                    <label class="block text-xs uppercase tracking-wider mb-2 text-cyan-400">Room ID:</label>
                    <input type="text" id="room-id-input" class="w-full bg-slate-900 border border-cyan-800 rounded px-3 py-2 text-cyan-200 focus:outline-none focus:border-cyan-400 font-mono" placeholder="例: 123456" value="123456">
                </div>

                <!-- ユーザーネーム設定 -->
                <div>
                    <label class="block text-xs uppercase tracking-wider mb-2 text-cyan-400">Your Name:</label>
                    <input type="text" id="username-input" class="w-full bg-slate-900 border border-cyan-800 rounded px-3 py-2 text-cyan-200 focus:outline-none focus:border-cyan-400" placeholder="例: トワもん" value="トワもん">
                </div>

                <!-- Google Cloud Vision API キー（パスワード） -->
                <div>
                    <label class="block text-xs uppercase tracking-wider mb-2 text-cyan-400 font-mono">Google Vision API Pass:</label>
                    <input type="password" id="vision-api-key-input" class="w-full bg-slate-900 border border-cyan-800 rounded px-3 py-2 text-cyan-200 focus:outline-none focus:border-cyan-400" placeholder="APIキーを入力してください" value="AIzaSyAqjlpWIPNCQVJqVnl_M4Orm3gZrnCULfM">
                </div>
            </div>
        </main>

        <!-- アクションボタン群 -->
        <footer class="max-w-md mx-auto w-full px-4 space-y-3">
            <button id="start-btn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-black font-bold py-4 px-6 rounded-lg text-lg uppercase tracking-wider shadow-[0_0_15px_rgba(6,182,212,0.4)] transition-all active:scale-95 flex items-center justify-center gap-2">
                📸 スキャン画面を開始する
            </button>
            <button id="reset-room-btn" class="w-full bg-transparent hover:bg-red-950/20 text-red-500 border border-red-900 font-bold py-3 px-6 rounded-lg text-sm tracking-wider transition-all active:scale-95">
                ルーム全体のデータを完全リセット
            </button>
        </footer>
    </div>

    <!-- ================= SCANNER SCREEN ================= -->
    <div id="scanner-screen" class="hidden fixed inset-0 z-20 flex flex-col justify-between bg-black">
        <!-- 上部カメラフィードエリア -->
        <div class="relative flex-grow w-full bg-zinc-950 overflow-hidden flex items-center justify-center">
            <video id="video" class="absolute w-full h-full object-cover" autoplay playsinline muted></video>
            <canvas id="canvas" class="hidden"></canvas>

            <!-- スカウターの枠線オーバーレイ -->
            <div class="absolute inset-4 border border-cyan-500/20 pointer-events-none flex flex-col justify-between p-2">
                <div class="flex justify-between">
                    <div class="w-6 h-6 border-t-2 border-l-2 border-cyan-400"></div>
                    <div class="w-6 h-6 border-t-2 border-r-2 border-cyan-400"></div>
                </div>
                <!-- ターゲット照準器（中央中央に配置） -->
                <div class="self-center w-40 h-20 border-2 border-dashed border-red-500/40 rounded flex items-center justify-center relative">
                    <span class="absolute text-[9px] text-red-500/60 font-mono -top-5">ALIGN TARGET HERE</span>
                </div>
                <div class="flex justify-between">
                    <div class="w-6 h-6 border-b-2 border-l-2 border-cyan-400"></div>
                    <div class="w-6 h-6 border-b-2 border-r-2 border-cyan-400"></div>
                </div>
            </div>

            <!-- スキャン撮影ボタン（映像の右中央に重ねて配置） -->
            <button id="capture-btn" class="absolute right-6 top-1/2 -translate-y-1/2 w-16 h-16 bg-red-600/80 active:bg-red-500 border-4 border-white rounded-full shadow-lg flex items-center justify-center z-30 transition-all active:scale-90">
                <span class="text-white text-[10px] font-bold tracking-wider font-mono">SCAN</span>
            </button>
        </div>

        <!-- 下部コントロールパネル（入力・オンライン状態・クリア・データベース表示） -->
        <div class="bg-slate-950 p-3 space-y-3 border-t border-cyan-900/50">
            <!-- 1. 操作・表示統合行（スキャン画面左下） -->
            <div class="control-row">
                <!-- 左側：倍率調整ボタン -->
                <button id="zoom-btn" class="control-btn">1.0x</button>

                <!-- 【引っ越し＆新規設計】中央：オンラインメンバー表示 -->
                <div id="online-status" class="scannerview-status">
                    <span class="status-indicator"></span>
                    <span id="online-text">待機中...</span>
                </div>

                <!-- 右側：スロットクリアボタン -->
                <button id="clear-btn" class="control-btn">クリア</button>
            </div>

            <!-- 2. 手動入力 ＆ リアルタイム同期スロット -->
            <div class="grid grid-cols-3 gap-2">
                <!-- スロット1 -->
                <div class="bg-slate-900/80 p-2 rounded border border-cyan-950 flex flex-col items-center">
                    <span class="text-[9px] text-cyan-600 font-mono">SLOT 01</span>
                    <input type="text" id="slot-1-input" class="w-full text-center bg-black border border-cyan-900/50 rounded py-1 text-sm text-cyan-300 font-mono focus:outline-none focus:border-cyan-400" placeholder="---">
                    <div id="slot-1-img-container" class="slot-img-container mt-1.5 w-full aspect-video bg-black flex items-center justify-center overflow-hidden rounded">
                        <span class="text-[9px] text-zinc-700 font-mono">NO IMAGE</span>
                    </div>
                </div>

                <!-- スロット2 -->
                <div class="bg-slate-900/80 p-2 rounded border border-cyan-950 flex flex-col items-center">
                    <span class="text-[9px] text-cyan-600 font-mono">SLOT 02</span>
                    <input type="text" id="slot-2-input" class="w-full text-center bg-black border border-cyan-900/50 rounded py-1 text-sm text-cyan-300 font-mono focus:outline-none focus:border-cyan-400" placeholder="---">
                    <div id="slot-2-img-container" class="slot-img-container mt-1.5 w-full aspect-video bg-black flex items-center justify-center overflow-hidden rounded">
                        <span class="text-[9px] text-zinc-700 font-mono">NO IMAGE</span>
                    </div>
                </div>

                <!-- スロット3 -->
                <div class="bg-slate-900/80 p-2 rounded border border-cyan-950 flex flex-col items-center">
                    <span class="text-[9px] text-cyan-600 font-mono">SLOT 03</span>
                    <input type="text" id="slot-3-input" class="w-full text-center bg-black border border-cyan-900/50 rounded py-1 text-sm text-cyan-300 font-mono focus:outline-none focus:border-cyan-400" placeholder="---">
                    <div id="slot-3-img-container" class="slot-img-container mt-1.5 w-full aspect-video bg-black flex items-center justify-center overflow-hidden rounded">
                        <span class="text-[9px] text-zinc-700 font-mono">NO IMAGE</span>
                    </div>
                </div>
            </div>

            <!-- ホームへ戻る -->
            <button id="back-to-home-btn" class="w-full py-2 bg-slate-900 hover:bg-slate-800 text-cyan-500 border border-cyan-950 rounded text-xs tracking-wider uppercase font-mono transition-all">
                ◀ Setup Configuration Screen
            </button>
        </div>
    </div>

    <!-- ================= JAVASCRIPT ================= -->
    <script>
        // ==========================================
        // 🔴【超重要】Firebaseの「本物の設定値」
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAqjlpWIPNCQVJqVnl_M4Orm3gZrnCULfM",
            authDomain: "tmon-gemini.firebaseapp.com",
            projectId: "tmon-gemini",
            storageBucket: "tmon-gemini.firebasestorage.app",
            messagingSenderId: "90913647133",
            appId: "1:90913647133:web:10185c7981f69e10f95c34"
        };

        // Initialize Firebase Compat
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Application State Variables
        let localStream = null;
        let currentRoomId = '123456';
        let currentUsername = 'トワもん';
        let unsubscribeRoom = null;
        let currentZoomLevel = 1.0;
        let activeTracks = [];

        // DOM elements
        const homeScreen = document.getElementById('home-screen');
        const scannerScreen = document.getElementById('scanner-screen');
        const roomIdInput = document.getElementById('room-id-input');
        const usernameInput = document.getElementById('username-input');
        const visionApiKeyInput = document.getElementById('vision-api-key-input');
        
        const startBtn = document.getElementById('start-btn');
        const resetRoomBtn = document.getElementById('reset-room-btn');
        const backToHomeBtn = document.getElementById('back-to-home-btn');
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const zoomBtn = document.getElementById('zoom-btn');
        const clearBtn = document.getElementById('clear-btn');
        
        const onlineText = document.getElementById('online-text');

        const slotInputs = [
            document.getElementById('slot-1-input'),
            document.getElementById('slot-2-input'),
            document.getElementById('slot-3-input')
        ];
        const slotContainers = [
            document.getElementById('slot-1-img-container'),
            document.getElementById('slot-2-img-container'),
            document.getElementById('slot-3-img-container')
        ];

        // ================= EVENT LISTENERS =================

        // 1. スキャン画面の起動
        startBtn.addEventListener('click', async () => {
            currentRoomId = roomIdInput.value.trim() || 'default-room';
            currentUsername = usernameInput.value.trim() || 'No Name';
            
            homeScreen.classList.add('hidden');
            scannerScreen.classList.remove('hidden');
            
            await startCamera();
            startFirebaseRoomSync();
        });

        // 2. 設定（セットアップ）画面へ戻る
        backToHomeBtn.addEventListener('click', () => {
            stopCamera();
            if (unsubscribeRoom) {
                unsubscribeRoom();
                unsubscribeRoom = null;
            }
            
            // Firebaseからローカルメンバー存在データを削除
            db.collection('rooms').doc(currentRoomId).collection('members').doc(currentUsername).delete();

            scannerScreen.classList.add('hidden');
            homeScreen.classList.remove('hidden');
        });

        // 3. ルームデータ完全リセット
        resetRoomBtn.addEventListener('click', async () => {
            const rid = roomIdInput.value.trim() || '123456';
            if (confirm(`ルームID [${rid}] の画像データ・スロット・メンバーデータをすべて削除して初期化しますか？`)) {
                try {
                    const roomDocRef = db.collection('rooms').doc(rid);
                    await roomDocRef.set({
                        photoMap: {},
                        currentQueries: ["", "", ""]
                    });
                    
                    // メンバー情報のクリーンアップ
                    const membersSnap = await roomDocRef.collection('members').get();
                    const batch = db.batch();
                    membersSnap.docs.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();

                    alert('ルーム情報を完全にクリーンアップしました。');
                } catch (e) {
                    console.error('リセットエラー:', e);
                    alert('初期化中にエラーが発生しました。');
                }
            }
        });

        // 4. クリア（入力リセット）ボタンの挙動
        clearBtn.addEventListener('click', async () => {
            await updateFirebaseQueries(["", "", ""]);
        });

        // 5. 手動入力時のFirebaseリアルタイム反映
        slotInputs.forEach((input, index) => {
            input.addEventListener('input', async () => {
                const updatedQueries = slotInputs.map(inp => inp.value.trim());
                await updateFirebaseQueries(updatedQueries);
            });
        });

        // 6. デジタルズーム切り替え (1.0x -> 2.0x -> 4.0x -> 1.0x)
        zoomBtn.addEventListener('click', () => {
            if (activeTracks.length > 0 && 'zoom' in activeTracks[0].getCapabilities()) {
                const caps = activeTracks[0].getCapabilities();
                const min = caps.zoom.min || 1;
                const max = caps.zoom.max || 4;
                
                if (currentZoomLevel === 1.0) currentZoomLevel = Math.min(2.0, max);
                else if (currentZoomLevel === 2.0) currentZoomLevel = Math.min(4.0, max);
                else currentZoomLevel = min;

                activeTracks[0].applyConstraints({ advanced: [{ zoom: currentZoomLevel }] })
                    .then(() => { zoomBtn.innerText = `${currentZoomLevel.toFixed(1)}x`; })
                    .catch(err => console.warn('ズーム設定エラー:', err));
            } else {
                // ハードウェアズーム非対応端末用の簡易CSS変形フォールバック
                if (currentZoomLevel === 1.0) currentZoomLevel = 2.0;
                else if (currentZoomLevel === 2.0) currentZoomLevel = 4.0;
                else currentZoomLevel = 1.0;

                video.style.transform = `scale(${currentZoomLevel})`;
                zoomBtn.innerText = `${currentZoomLevel.toFixed(1)}x`;
            }
        });

        // ================= CAMERA ENGINE =================

        async function startCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
            } catch (err) {
                console.warn("背面カメラの取得に失敗しました。汎用カメラを使用します:", err);
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                } catch (fallbackErr) {
                    alert("カメラを起動できませんでした。ブラウザの設定でカメラ許可を確認してください。");
                    return;
                }
            }
            video.srcObject = localStream;
            activeTracks = localStream.getVideoTracks();
        }

        function stopCamera() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            activeTracks = [];
        }

        // ================= CLOUD VISION API OCR & TRIMMING =================

        captureBtn.addEventListener('click', async () => {
            if (!localStream) return;

            captureBtn.disabled = true;
            captureBtn.style.opacity = "0.5";

            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const ocrApiKey = visionApiKeyInput.value.trim();
            if (!ocrApiKey) {
                alert('Cloud Vision APIキーが無効です。設定に戻って確認してください。');
                resetCaptureButton();
                return;
            }

            try {
                // 中央のトリミング領域を計算（アス比やスカウターの枠に対応）
                const boxW = canvas.width * 0.4;
                const boxH = canvas.height * 0.2;
                const boxX = (canvas.width - boxW) / 2;
                const boxY = (canvas.height - boxH) / 2;

                const ocrCanvas = document.createElement('canvas');
                ocrCanvas.width = boxW;
                ocrCanvas.height = boxH;
                const ocrCtx = ocrCanvas.getContext('2d');
                ocrCtx.drawImage(canvas, boxX, boxY, boxW, boxH, 0, 0, boxW, boxH);

                const base64Img = ocrCanvas.toDataURL('image/jpeg').replace(/^data:image\/jpeg;base64,/, "");

                // Google Vision OCR API 呼び出し
                const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${ocrApiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        requests: [{
                            image: { content: base64Img },
                            features: [{ type: "TEXT_DETECTION" }]
                        }]
                    })
                });

                const data = await res.json();
                const annotations = data.responses?.[0]?.textAnnotations;
                
                if (!annotations || annotations.length === 0) {
                    alert('文字を検出できませんでした。照準器に数字が綺麗に収まるようにして再度撮影してください。');
                    resetCaptureButton();
                    return;
                }

                // OCRで得られた最初の一連の数字を取り出し
                const rawText = annotations[0].description;
                const numericMatch = rawText.match(/\d+/);

                if (!numericMatch) {
                    alert(`数字が読み取れませんでした。\n読み取ったテキスト: "${rawText}"`);
                    resetCaptureButton();
                    return;
                }

                const detectedNumber = numericMatch[0];

                // 登録のための異なるサイズ比率の3つをトリミング作成
                const tWidths = [canvas.width * 0.5, canvas.width * 0.6, canvas.width * 0.7];
                const tHeights = [canvas.height * 0.4, canvas.height * 0.5, canvas.height * 0.6];
                const imagesBase64 = [];

                for (let i = 0; i < 3; i++) {
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = tWidths[i];
                    tempCanvas.height = tHeights[i];
                    const tempCtx = tempCanvas.getContext('2d');
                    
                    const tx = (canvas.width - tWidths[i]) / 2;
                    const ty = (canvas.height - tHeights[i]) / 2;
                    
                    tempCtx.drawImage(canvas, tx, ty, tWidths[i], tHeights[i], 0, 0, tWidths[i], tHeights[i]);
                    imagesBase64.push(tempCanvas.toDataURL('image/jpeg', 0.6));
                }

                // Firebaseへ画像を同期アップロード
                const roomDocRef = db.collection('rooms').doc(currentRoomId);
                await db.runTransaction(async (transaction) => {
                    const sfDoc = await transaction.get(roomDocRef);
                    let currentMap = {};
                    if (sfDoc.exists) {
                        currentMap = sfDoc.data().photoMap || {};
                    }
                    currentMap[detectedNumber] = imagesBase64;
                    transaction.set(roomDocRef, { photoMap: currentMap }, { merge: true });
                });

                alert(`データベースに【${detectedNumber}】を登録しました！`);

            } catch (err) {
                console.error(err);
                alert('OCRスキャン、またはデータベース通信中にエラーが発生しました。');
            } finally {
                resetCaptureButton();
            }
        });

        function resetCaptureButton() {
            captureBtn.disabled = false;
            captureBtn.style.opacity = "1";
        }

        // ================= FIREBASE SYNC CONTROLLER =================

        async function updateFirebaseQueries(queries) {
            try {
                await db.collection('rooms').doc(currentRoomId).set({
                    currentQueries: queries
                }, { merge: true });
            } catch (e) {
                console.error("クエリアップデートエラー: ", e);
            }
        }

        function startFirebaseRoomSync() {
            const roomDocRef = db.collection('rooms').doc(currentRoomId);

            // 自身をオンライン登録
            const memberRef = roomDocRef.collection('members').doc(currentUsername);
            memberRef.set({
                lastActive: firebase.firestore.FieldValue.serverTimestamp()
            });

            // メンバーがオフラインになった時の処理
            memberRef.onDisconnect().delete();

            // 部屋データ全体のリアルタイム監視（画像データベース ＆ クエリ）
            unsubscribeRoom = roomDocRef.onSnapshot((doc) => {
                if (!doc.exists) return;
                
                const data = doc.data();
                const photoMap = data.photoMap || {};
                const queries = data.currentQueries || ["", "", ""];

                // 1. 各スロットの入力値を更新
                queries.forEach((val, index) => {
                    if (document.activeElement !== slotInputs[index]) {
                        slotInputs[index].value = val;
                    }
                });

                // 2. クエリに合致した画像の出し分けロジック
                queries.forEach((query, index) => {
                    const container = slotContainers[index];
                    container.innerHTML = "";
                    container.classList.remove('active');

                    if (query && photoMap[query]) {
                        // 3パターンあるうち、それぞれのスロットに割り当てた比率の画像を描写
                        const base64Src = photoMap[query][index] || photoMap[query][0];
                        const img = document.createElement('img');
                        img.src = base64Src;
                        img.className = "w-full h-full object-cover";
                        container.appendChild(img);
                        container.classList.add('active');
                    } else {
                        container.innerHTML = `<span class="text-[9px] text-zinc-700 font-mono">NO IMAGE</span>`;
                    }
                });
            }, (error) => {
                console.error("スナップショット受信エラー:", error);
            });

            // オンラインメンバー一覧のリアルタイム監視
            roomDocRef.collection('members').onSnapshot((snapshot) => {
                const memberList = [];
                snapshot.forEach(doc => {
                    memberList.push(doc.id);
                });
                
                if (memberList.length > 0) {
                    // 表示テキストを「オンライン人数」または「ユーザー名のリスト」に書き換えます
                    onlineText.innerText = `${memberList.length} ONLINE`;
                    onlineText.title = memberList.join(', '); // ホバーした時に参加者の名前を確認できるように設定
                } else {
                    onlineText.innerText = "STANDBY";
                }
            });
        }
    </script>
</body>
</html>
