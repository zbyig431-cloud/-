<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER OCR SYSTEM [RAPID STREAM UI]</title>
    <style>
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace, sans-serif; }
        body { 
            background-color: #060d13; 
            color: #cceeff; 
            margin: 0; 
            padding: 15px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* サイバーグリッド背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 1000;
        }

        h1 {
            font-size: 1.3rem;
            text-align: center;
            margin: 0 0 15px 0;
            color: #8cc8ff;
            text-shadow: 0 0 8px rgba(140, 200, 255, 0.6);
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(140, 200, 255, 0.3);
            padding-bottom: 5px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #00ff66;
            margin-bottom: 10px;
            text-shadow: 0 0 5px rgba(0, 255, 100, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 常時起動カメラビューファインダー */
        .camera-container {
            width: 100%;
            background: #000;
            border: 2px solid #8cc8ff;
            box-shadow: 0 0 15px rgba(140, 200, 255, 0.2);
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
            aspect-ratio: 4 / 3;
        }

        #camera-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* スキャン用超高速シャッターUI */
        .shutter-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-shutter {
            flex: 1;
            background: linear-gradient(135deg, #0055aa, #002255);
            color: #cceeff;
            border: 2px solid #8cc8ff;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(140, 200, 255, 0.4);
            text-shadow: 0 0 5px #cceeff;
            transition: all 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-shutter:active {
            background: #00ff66;
            color: #000;
            border-color: #ffffff;
            box-shadow: 0 0 15px #00ff66;
            transform: scale(0.98);
        }

        /* 撮影ログ・プレビューカルーセル */
        .log-carousel {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            margin-bottom: 15px;
            border-bottom: 1px dashed rgba(140, 200, 255, 0.2);
        }
        .log-item {
            flex: 0 0 70px;
            height: 70px;
            border: 1px solid rgba(140, 200, 255, 0.4);
            position: relative;
            background: #0b1520;
            border-radius: 2px;
        }
        .log-item img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .log-item .status-badge {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.7);
            font-size: 0.5rem;
            text-align: center;
            color: #00ff66;
            padding: 1px 0;
        }
        .log-item.processing .status-badge { color: #ffcc00; }
        .log-item.error .status-badge { color: #ff3333; }

        /* APIキー入力エリア（折りたたみ） */
        .config-box {
            background: rgba(140, 200, 255, 0.05);
            border: 1px solid rgba(140, 200, 255, 0.2);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .config-box input {
            width: 100%;
            background: #0b1520;
            border: 1px solid #8cc8ff;
            color: #00ff66;
            padding: 8px;
            font-size: 0.8rem;
            border-radius: 2px;
        }

        /* 控制・検索パネル */
        .control-panel {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .search-input {
            width: 100%;
            background: #0b1520;
            border: 2px solid #00ff66;
            color: #00ff66;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(0, 255, 100, 0.2);
        }
        .btn-execute {
            background: linear-gradient(135deg, #00aa44, #005522);
            color: #ffffff;
            border: 2px solid #00ff66;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 100, 0.3);
        }
        .btn-execute:active { background: #00ff66; color: #000; }

        /* サマリーとリセットレイアウト */
        .output-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            flex-grow: 1;
        }
        .summary-card {
            background: rgba(13, 27, 42, 0.8);
            border: 2px solid #00ff66;
            border-radius: 4px;
            padding: 12px;
            box-shadow: 0 0 15px rgba(0, 255, 100, 0.15);
            display: flex;
            flex-direction: column;
        }
        .summary-header {
            font-size: 0.8rem;
            color: #8cc8ff;
            border-bottom: 1px dashed rgba(0, 255, 100, 0.3);
            padding-bottom: 5px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .summary-result {
            font-size: 2.2rem;
            font-weight: bold;
            color: #00ff66;
            text-align: center;
            margin: auto 0;
            text-shadow: 0 0 10px rgba(0, 255, 100, 0.6);
        }
        .summary-crop {
            width: 100%;
            height: 70px;
            border: 1px solid rgba(140, 200, 255, 0.3);
            margin-top: 10px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 2px;
        }
        .summary-crop img {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }

        .btn-reset {
            width: 100%;
            background: linear-gradient(135deg, #881111, #440000);
            color: #ff8888;
            border: 1px solid #ff3333;
            padding: 10px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        .btn-reset:active { background: #ff3333; color: #fff; }

        /* スキャン中インジケータ */
        .loading-dimmer {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 20, 40, 0.4);
            z-index: 10;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            color: #00ff66;
            text-shadow: 0 0 5px #00ff66;
        }
        .loading-dimmer::after {
            content: "SCANNING...";
            animation: blink 0.6s infinite alternate;
        }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h1>CYBER OCR SYSTEM v2.0</h1>

    <!-- 設定エリア -->
    <div class="config-box">
        <div style="font-size:0.75rem; margin-bottom:5px; color:#8cc8ff;">VISION API KEY:</div>
        <input type="password" id="api-key" placeholder="AIzaSy..." onchange="saveApiKey()">
    </div>

    <!-- 01: DATABASE IMAGES (常時起動ストリーム) -->
    <div class="section-title">
        <span>[01] DATABASE STREAM</span>
        <span id="db-counter" style="color:#8cc8ff;">STOCKS: 0</span>
    </div>
    
    <div class="camera-container">
        <video id="camera-stream" autoplay playsinline muted></video>
        <div class="loading-dimmer" id="scan-indicator"></div>
    </div>

    <!-- 超高速連続シャッターボタン -->
    <div class="shutter-panel">
        <button class="btn-shutter" id="shutter-trigger">
            ⚡ RAPID CAPTURE & SCAN
        </button>
    </div>

    <!-- 撮影履歴ログ（連打した結果がここに並ぶ） -->
    <div class="log-carousel" id="log-carousel"></div>

    <!-- 02: TARGET SEARCH -->
    <div class="section-title">[02] TARGET NUMBER SEARCH</div>
    <div class="control-panel">
        <input type="tel" class="search-input" id="search-number" placeholder="ENTER NUM">
        <button class="btn-execute" id="btn-search">EXECUTE<br>SEARCH</button>
    </div>

    <!-- 03: SUMMARY OUTPUT -->
    <div class="section-title">[03] SYSTEM SUMMARY</div>
    <div class="output-grid">
        <div class="summary-card">
            <div class="summary-header">MATCHING TARGET ALPHABET</div>
            <div class="summary-result" id="summary-alpha">---</div>
            <div class="summary-header" style="margin-top:10px;">VERIFICATION AREA CROP</div>
            <div class="summary-crop" id="summary-crop-container">
                <span style="color:rgba(140,200,255,0.4); font-size:0.8rem;">NO DATA</span>
            </div>
        </div>
    </div>

    <button class="btn-reset" id="btn-reset-all">FULL RESET SYSTEM</button>

    <!-- 非表示の受取用Canvas -->
    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script>
        // グローバルデータストック
        let allPhotosData = []; 
        let streamObject = null;

        // 起動時処理
        window.addEventListener('DOMContentLoaded', () => {
            loadApiKey();
            initCameraStream();
            
            document.getElementById('shutter-trigger').addEventListener('click', captureAndScan);
            document.getElementById('btn-search').addEventListener('click', executeSearch);
            document.getElementById('btn-reset-all').addEventListener('click', resetSystem);
        });

        // カメラストリームの常時起動初期化
        async function initCameraStream() {
            const video = document.getElementById('camera-stream');
            try {
                if (streamObject) {
                    streamObject.getTracks().forEach(track => track.stop());
                }
                const constraints = {
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                // 背面カメラがないPC環境などのフォールバック
                streamObject = await navigator.mediaDevices.getUserMedia(constraints)
                    .catch(() => navigator.mediaDevices.getUserMedia({ video: true, audio: false }));
                
                video.srcObject = streamObject;
            } catch (err) {
                alert("カメラの起動に失敗しました。権限を確認してください: " + err.message);
            }
        }

        // 連打対応：シャッターを押した瞬間にキャプチャしてOCRリクエストを投げる
        async function captureAndScan() {
            const video = document.getElementById('camera-stream');
            const canvas = document.getElementById('capture-canvas');
            const carousel = document.getElementById('log-carousel');
            const apiKey = document.getElementById('api-key').value.trim();

            if (!apiKey) {
                alert("先にVision API Keyを入力してください。");
                return;
            }

            if (!video.srcObject) {
                alert("カメラストリームが準備できていません。");
                return;
            }

            // 瞬間キャプチャ
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const base64Image = canvas.toDataURL('image/jpeg', 0.85);

            // カルーセル（履歴）にプレビュー用枠を即座に追加して未処理表示
            const logId = "log-" + Date.now() + "-" + Math.random().toString(36).substr(2, 5);
            const logItem = document.createElement('div');
            logItem.className = 'log-item processing';
            logItem.id = logId;
            
            const imgEl = document.createElement('img');
            imgEl.src = base64Image;
            logItem.appendChild(imgEl);
            
            const badge = document.createElement('div');
            badge.className = 'status-badge';
            badge.innerText = 'RUNNING';
            logItem.appendChild(badge);
            
            carousel.insertBefore(logItem, carousel.firstChild);

            // カメラ枠のフラッシュエフェクト（インジケータ一瞬表示）
            const indicator = document.getElementById('scan-indicator');
            indicator.style.display = 'flex';
            setTimeout(() => { indicator.style.display = 'none'; }, 150);

            // 非同期でGoogle Cloud Vision APIを叩く（次の連打をブロックしない）
            sendToVisionAPI(base64Image, logId);
        }

        // Google OCR 処理 (非同期実行)
        async function sendToVisionAPI(base64Data, logId) {
            const apiKey = document.getElementById('api-key').value.trim();
            const logItem = document.getElementById(logId);
            const pureBase64 = base64Data.replace(/^data:image\/jpeg;base64,/, "");

            const requestBody = {
                requests: [{
                    image: { content: pureBase64 },
                    features: [{ type: "TEXT_DETECTION" }]
                }]
            };

            try {
                const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                const annotations = data.responses[0]?.textAnnotations;

                if (!annotations || annotations.length === 0) {
                    throw new Error("文字が検出されませんでした");
                }

                // 高精度抽出ロジックの実行
                const parsedData = parseOcrAnnotations(annotations, base64Data);
                
                // ストックデータに蓄積
                allPhotosData.push({
                    id: logId,
                    base64: base64Data,
                    blocks: parsedData
                });

                // カルーセルUIの状態を成功に更新
                logItem.className = 'log-item';
                logItem.querySelector('.status-badge').innerText = 'SUCCESS';
                logItem.querySelector('.status-badge').style.color = '#00ff66';

                // ストック数を更新
                document.getElementById('db-counter').innerText = `STOCKS: ${allPhotosData.length}`;

            } catch (err) {
                console.error(err);
                if (logItem) {
                    logItem.className = 'log-item error';
                    logItem.querySelector('.status-badge').innerText = 'ERR';
                    logItem.querySelector('.status-badge').style.color = '#ff3333';
                }
            }
        }

        // [ロジック部] 真下のアルファベットを高精度に紐付ける
        function parseOcrAnnotations(annotations, base64Image) {
            const fullText = annotations[0].description;
            const lines = fullText.split('\n');
            const rawBlocks = annotations.slice(1);
            let parsedBlocks = [];

            // 1文字ずつの中心座標とサイズをマッピング
            let charObjects = rawBlocks.map(b => {
                const vertices = b.boundingPoly.vertices;
                const xs = vertices.map(v => v.x ?? 0);
                const ys = vertices.map(v => v.y ?? 0);
                const minX = Math.min(...xs);
                const maxX = Math.max(...xs);
                const minY = Math.min(...ys);
                const maxY = Math.max(...ys);
                return {
                    text: b.description,
                    centerX: minX + (maxX - minX) / 2,
                    centerY: minY + (maxY - minY) / 2,
                    width: maxX - minX,
                    height: maxY - minY,
                    minX, maxX, minY, maxY
                };
            });

            // 四角の中の数字（4桁など）を検出
            const numberRegex = /^\d+$/;
            let numberBlocks = charObjects.filter(b => numberRegex.test(b.text));

            // 単一文字で分割されてしまっている数字を結合する処理
            // (Vision APIが連続した数字をバラバラに読んだ場合の救済策)
            // ここでは簡易的に、単体の数字の周囲にあるアルファベットとの距離を測定

            let alphaBlocks = charObjects.filter(b => /^[A-Z]$/i.test(b.text));

            // 数字ブロックごとに「すぐ下」にあるアルファベットを探索
            numberBlocks.forEach(numBlk => {
                let bestMatchAlpha = null;
                let minDistance = Infinity;

                alphaBlocks.forEach(alphaBlk => {
                    // X座標のズレ（水平方向の重なり）
                    const xDiff = Math.abs(numBlk.centerX - alphaBlk.centerX);
                    // Y座標のズレ（数字の下にアルファベットがあるか）
                    const yDiff = alphaBlk.centerY - numBlk.centerY;

                    // 条件：アルファベットが数字より下にあり、X軸のズレが許容範囲内
                    if (yDiff > 0 && xDiff < (numBlk.width * 1.5)) {
                        const distance = Math.sqrt(xDiff * xDiff + yDiff * yDiff);
                        if (distance < minDistance) {
                            minDistance = distance;
                            bestMatchAlpha = alphaBlk;
                        }
                    }
                });

                if (bestMatchAlpha) {
                    parsedBlocks.push({
                        number: numBlk.text,
                        alphabet: bestMatchAlpha.text,
                        // クロップ用の座標を保持（数字とアルファベットを囲む矩形）
                        cropArea: {
                            minX: Math.min(numBlk.minX, bestMatchAlpha.minX) - 10,
                            minY: Math.min(numBlk.minY, bestMatchAlpha.minY) - 10,
                            maxX: Math.max(numBlk.maxX, bestMatchAlpha.maxX) + 10,
                            maxY: Math.max(numBlk.maxY, bestMatchAlpha.maxY) + 10
                        }
                    });
                }
            });

            return parsedBlocks;
        }

        // [検索実行] 蓄積された全ストックの中から指定された数字を探し出す
        function executeSearch() {
            const query = document.getElementById('search-number').value.trim();
            const alphaOutput = document.getElementById('summary-alpha');
            const cropContainer = document.getElementById('summary-crop-container');

            if (!query) {
                alert("検索する数字を入力してください。");
                return;
            }

            let foundMatch = null;
            let sourcePhotoBase64 = null;

            // ストックされた画像データを新しい順（逆順）にループして検索
            for (let i = allPhotosData.length - 1; i >= 0; i--) {
                const photo = allPhotosData[i];
                const match = photo.blocks.find(b => b.number === query);
                if (match) {
                    foundMatch = match;
                    sourcePhotoBase64 = photo.base64;
                    break; // 最新の該当データが見つかったら終了
                }
            }

            if (foundMatch && sourcePhotoBase64) {
                // アルファベット表示
                alphaOutput.innerText = foundMatch.alphabet.toUpperCase();
                
                // 切り抜きスクショの生成と表示
                const img = new Image();
                img.src = sourcePhotoBase64;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const area = foundMatch.cropArea;
                    const w = area.maxX - area.minX;
                    const h = area.maxY - area.minY;
                    
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, area.minX, area.minY, w, h, 0, 0, w, h);
                    
                    cropContainer.innerHTML = "";
                    const cropImg = document.createElement('img');
                    cropImg.src = canvas.toDataURL('image/jpeg');
                    cropContainer.appendChild(cropImg);
                };
            } else {
                alphaOutput.innerText = "N/A";
                cropContainer.innerHTML = `<span style="color:#ff3333; font-size:0.8rem;">NOT FOUND</span>`;
            }
        }

        // フルリセット機能
        function resetSystem() {
            if (!confirm("蓄積されたデータベース写真をすべて消去しリセットしますか？")) return;
            
            allPhotosData = [];
            document.getElementById('log-carousel').innerHTML = "";
            document.getElementById('db-counter').innerText = "STOCKS: 0";
            document.getElementById('search-number').value = "";
            document.getElementById('summary-alpha').innerText = "---";
            document.getElementById('summary-crop-container').innerHTML = `<span style="color:rgba(140,200,255,0.4); font-size:0.8rem;">NO DATA</span>`;
            
            // カメラストリームの再接続
            initCameraStream();
        }

        // ローカルストレージを使用したAPIキー管理
        function saveApiKey() {
            const key = document.getElementById('api-key').value;
            localStorage.setItem('cyber_ocr_api_key', key);
        }
        function loadApiKey() {
            const savedKey = localStorage.getItem('cyber_ocr_api_key');
            if (savedKey) {
                document.getElementById('api-key').value = savedKey;
            }
        }
    </script>
</body>
</html>
